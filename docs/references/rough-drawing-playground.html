<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rough Smart Drawing Playground</title>
  <link rel="preload" href="https://excalidraw.nyc3.cdn.digitaloceanspaces.com/fonts/Excalifont-Regular.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
  <style>
    @font-face {
      font-family: 'Excalifont';
      src: url('https://excalidraw.nyc3.cdn.digitaloceanspaces.com/fonts/Excalifont-Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --paper: #fbfdff;
      --ink: #201f1c;
      --panel: rgba(255, 252, 244, 0.88);
      --line: rgba(35, 32, 25, 0.16);
      --shadow: rgba(35, 32, 25, 0.16);
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 10%, rgba(255,255,255,0.55), transparent 24rem),
        radial-gradient(circle at 80% 90%, rgba(70, 110, 160, 0.025), transparent 22rem),
        linear-gradient(135deg, rgba(70, 110, 160, 0.012) 25%, transparent 25%) 0 0 / 18px 18px,
        #fbfdff;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
      cursor: crosshair;
    }

    body.hand-mode canvas {
      cursor: grab;
    }

    body.dragging-shape canvas {
      cursor: grabbing;
    }

    body.text-mode canvas {
      cursor: text;
    }

    body.select-mode canvas {
      cursor: cell;
    }

    .toolbar {
      position: fixed;
      left: 50%;
      bottom: 18px;
      z-index: 10;
      transform: translateX(-50%);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 8px;
      max-width: min(980px, calc(100vw - 24px));
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: 0 16px 50px var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      user-select: none;
    }

    .group {
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 34px;
      padding: 2px 4px;
    }

    .group + .group {
      border-left: 1px solid var(--line);
      padding-left: 10px;
    }

    button,
    input[type="color"] {
      color: var(--ink);
      border: 1px solid rgba(35, 32, 25, 0.18);
      border-radius: 11px;
      background: rgba(255, 255, 255, 0.58);
      font: inherit;
    }

    button {
      height: 30px;
      padding: 0 10px;
      cursor: pointer;
    }

    button:hover,
    input[type="color"]:hover {
      border-color: rgba(35, 32, 25, 0.36);
      background: rgba(255, 255, 255, 0.82);
    }

    button.active {
      color: #fffaf0;
      background: var(--ink);
      border-color: var(--ink);
    }

    button:active {
      transform: translateY(1px);
    }

    input[type="color"] {
      width: 34px;
      height: 30px;
      padding: 3px;
      cursor: pointer;
    }

    label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      font-size: 12px;
      color: rgba(32, 31, 28, 0.78);
    }

    input[type="range"] {
      width: 82px;
      accent-color: var(--ink);
    }

    .value {
      min-width: 2.4em;
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: rgba(32, 31, 28, 0.68);
    }

    .hint {
      position: fixed;
      left: 14px;
      top: 12px;
      z-index: 8;
      max-width: min(560px, calc(100vw - 28px));
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 252, 244, 0.74);
      color: rgba(32, 31, 28, 0.62);
      font-size: 12px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      pointer-events: none;
    }

    .text-editor {
      position: fixed;
      z-index: 20;
      min-width: 160px;
      min-height: 42px;
      padding: 4px 6px;
      border: 1px dashed rgba(35, 32, 25, 0.45);
      border-radius: 8px;
      outline: none;
      resize: both;
      overflow: hidden;
      background: rgba(255, 252, 244, 0.88);
      color: var(--ink);
      font-family: 'Excalifont', cursive;
      font-size: 28px;
      line-height: 1.15;
      box-shadow: 0 10px 28px rgba(35, 32, 25, 0.12);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    @media (max-width: 760px) {
      .toolbar {
        bottom: 10px;
        justify-content: flex-start;
        overflow-x: auto;
        flex-wrap: nowrap;
        border-radius: 14px;
      }

      .group {
        flex: 0 0 auto;
      }

      .hint {
        display: none;
      }

      input[type="range"] {
        width: 70px;
      }
    }
  </style>
</head>
<body>
  <canvas id="canvas" aria-label="Rough drawing canvas"></canvas>

  <div class="hint">
    Draw inside the faint puppet frame. Play animates a walking loop. Stop resets to the stored drawing. Cmd/Ctrl+Z undo, Cmd/Ctrl+Shift+Z redo.
  </div>

  <div class="toolbar" role="toolbar" aria-label="Drawing controls">
    <div class="group" aria-label="Tools">
      <button type="button" class="tool active" data-tool="smart">Smart</button>
      <button type="button" class="tool" data-tool="select">Select</button>
      <button type="button" class="tool" data-tool="hand">Hand</button>
      <button type="button" class="tool" data-tool="text">Text</button>
    </div>

    <div class="group">
      <label title="Stroke color">
        Stroke
        <input id="strokeColor" type="color" value="#222222" />
      </label>
    </div>

    <div class="group">
      <label>
        Rough
        <input id="roughness" type="range" min="0" max="4" step="0.1" value="1.5" />
        <span id="roughnessValue" class="value">1.5</span>
      </label>

      <label>
        Bow
        <input id="bowing" type="range" min="0" max="10" step="0.1" value="1.0" />
        <span id="bowingValue" class="value">1.0</span>
      </label>

      <label>
        Width
        <input id="strokeWidth" type="range" min="1" max="14" step="0.5" value="2" />
        <span id="strokeWidthValue" class="value">2.0</span>
      </label>
    </div>

    <div class="group">
      <button id="playBtn" type="button">Play</button>
      <button id="stopBtn" type="button">Stop</button>
      <button id="undoBtn" type="button">Undo</button>
      <button id="redoBtn" type="button">Redo</button>
      <button id="clearBtn" type="button">Clear</button>
      <button id="pngBtn" type="button">Export PNG</button>
      <button id="svgBtn" type="button">Export SVG</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/roughjs@4.6.6/bundled/rough.js"></script>
  <script>
    (() => {
      "use strict";

      if (!window.rough) {
        document.body.innerHTML =
          '<p style="margin:2rem;font:16px system-ui">rough.js failed to load. Check your network connection.</p>';
        return;
      }

      const STORAGE_KEY = "rough-drawing-playground:v2";

      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d", { alpha: false });

      const controls = {
        strokeColor: document.getElementById("strokeColor"),
        roughness: document.getElementById("roughness"),
        roughnessValue: document.getElementById("roughnessValue"),
        bowing: document.getElementById("bowing"),
        bowingValue: document.getElementById("bowingValue"),
        strokeWidth: document.getElementById("strokeWidth"),
        strokeWidthValue: document.getElementById("strokeWidthValue"),
        playBtn: document.getElementById("playBtn"),
        stopBtn: document.getElementById("stopBtn"),
        undoBtn: document.getElementById("undoBtn"),
        redoBtn: document.getElementById("redoBtn"),
        clearBtn: document.getElementById("clearBtn"),
        pngBtn: document.getElementById("pngBtn"),
        svgBtn: document.getElementById("svgBtn")
      };

      let rc = rough.canvas(canvas);
      const gen = rough.generator();

      let dpr = 1;
      let viewWidth = 0;
      let viewHeight = 0;
      let currentTool = "smart";
      let activeDrag = null;
      let shapeId = 1;
      let selectedIds = [];
      let isPlaying = false;
      let animationStart = 0;
      let animationFrameId = null;

      const shapes = [];
      const historyStack = [];
      const redoStack = [];

      function newSeed() {
        return typeof rough.newSeed === "function"
          ? rough.newSeed()
          : Math.floor(Math.random() * 2147483647);
      }

      function clampNumber(value, fallback) {
        const n = Number(value);
        return Number.isFinite(n) ? n : fallback;
      }

      function roundPoint(point) {
        return [Math.round(point[0] * 10) / 10, Math.round(point[1] * 10) / 10];
      }

      function currentOptions(seed = newSeed()) {
        return {
          stroke: controls.strokeColor.value,
          fill: null,
          fillStyle: "hachure",
          roughness: clampNumber(controls.roughness.value, 1.5),
          bowing: clampNumber(controls.bowing.value, 1),
          strokeWidth: clampNumber(controls.strokeWidth.value, 2),
          seed
        };
      }

      function roughOptions(options, type) {
        const out = {
          stroke: options.stroke || "#222222",
          roughness: clampNumber(options.roughness, 1.5),
          bowing: clampNumber(options.bowing, 1),
          strokeWidth: clampNumber(options.strokeWidth, 2),
          seed: clampNumber(options.seed, 1)
        };

        if ((type === "rectangle" || type === "ellipse") && options.fill) {
          out.fill = options.fill;
          out.fillStyle = options.fillStyle || "hachure";
        }

        return out;
      }

      function shapeZRank(shape) {
        if (!shape || !shape.options || !shape.options.fill) {
          return shape && shape.type === "text" ? 5 : 4;
        }

        const style = shape.options.fillStyle;

        if (style === "solid") return 0;
        if (style === "zigzag" || style === "dots") return 1;
        if (style === "cross-hatch") return 2;
        if (style === "hachure") return 3;

        return 1;
      }

      function orderedShapeEntries() {
        return shapes
          .map((shape, index) => ({ shape, index, rank: shapeZRank(shape) }))
          .sort((a, b) => {
            if (a.rank !== b.rank) return a.rank - b.rank;
            return a.index - b.index;
          });
      }

      function orderedShapes() {
        return orderedShapeEntries().map((entry) => entry.shape);
      }

      function puppetGuide() {
        const width = Math.min(460, Math.max(260, viewWidth * 0.42));
        const height = Math.min(620, Math.max(360, viewHeight * 0.62));
        const x = (viewWidth - width) / 2;
        const y = (viewHeight - height) / 2;
        const bodyHeight = height * (2 / 3);
        const legHeight = height - bodyHeight;
        const legWidth = width / 2;

        return {
          outer: { x, y, width, height },
          body: { x, y, width, height: bodyHeight },
          leftLeg: { x, y: y + bodyHeight, width: legWidth, height: legHeight },
          rightLeg: { x: x + legWidth, y: y + bodyHeight, width: legWidth, height: legHeight }
        };
      }

      function drawPuppetGuide() {
        const guide = puppetGuide();

        ctx.save();
        ctx.lineWidth = 1.2;
        ctx.strokeStyle = "rgba(45, 83, 135, 0.18)";
        ctx.fillStyle = "rgba(45, 83, 135, 0.018)";
        ctx.setLineDash([8, 7]);

        for (const box of [guide.body, guide.leftLeg, guide.rightLeg]) {
          ctx.fillRect(box.x, box.y, box.width, box.height);
          ctx.strokeRect(box.x, box.y, box.width, box.height);
        }

        ctx.setLineDash([]);
        ctx.strokeStyle = "rgba(45, 83, 135, 0.10)";
        ctx.strokeRect(guide.outer.x, guide.outer.y, guide.outer.width, guide.outer.height);
        ctx.restore();
      }

      function boxCenter(box) {
        return {
          x: box.x + box.width / 2,
          y: box.y + box.height / 2
        };
      }

      function pointInsideBox(point, box) {
        return (
          point.x >= box.x &&
          point.x <= box.x + box.width &&
          point.y >= box.y &&
          point.y <= box.y + box.height
        );
      }

      function puppetPartForShape(shape) {
        const box = shapeBounds(shape);
        const center = boxCenter(box);
        const guide = puppetGuide();

        if (pointInsideBox(center, guide.body)) return "body";
        if (pointInsideBox(center, guide.leftLeg)) return "leftLeg";
        if (pointInsideBox(center, guide.rightLeg)) return "rightLeg";
        return null;
      }

      function animationTransformForPart(part) {
        if (!isPlaying || !part) return { x: 0, y: 0, rotate: 0, cx: 0, cy: 0 };

        const t = (performance.now() - animationStart) / 1000;
        const speed = 1.35;
        const phaseBase = (t * speed) % 1;
        const cycle = phaseBase * Math.PI * 2;
        const guide = puppetGuide();

        // More subtle side-to-side crossing: about half the previous travel.
        const crossover = Math.min(guide.leftLeg.width * 0.055, 6);
        // Slightly bigger vertical step.
        const lift = 10.5;

        function smoothstep(v) {
          const x = Math.max(0, Math.min(1, v));
          return x * x * (3 - 2 * x);
        }

        // Vertical step cycle only: lift -> hold high while stepping -> lower -> grounded.
        function legVerticalPose(phase) {
          let y = 0;

          if (phase < 0.25) {
            const p = smoothstep(phase / 0.25);
            y = -lift * p;
          } else if (phase < 0.5) {
            y = -lift;
          } else if (phase < 0.75) {
            const p = smoothstep((phase - 0.5) / 0.25);
            y = -lift * (1 - p);
          } else {
            y = 0;
          }

          return y;
        }

        // Side-to-side crossover stays exact counter-phase.
        const leftX = Math.sin(cycle) * crossover;
        const rightX = -Math.sin(cycle) * crossover;

        // Top/down timing remains counter-phased between legs.
        const leftY = legVerticalPose(phaseBase);
        const rightY = legVerticalPose((phaseBase + 0.5) % 1);

        if (part === "body") {
          // Calm single-frequency bob. No extra stride-frequency tremble.
          return {
            x: 0,
            y: Math.sin(cycle) * 2.2,
            rotate: Math.sin(cycle) * 0.0018,
            cx: guide.body.x + guide.body.width / 2,
            cy: guide.body.y + guide.body.height / 2
          };
        }

        if (part === "leftLeg") {
          return {
            x: leftX,
            y: leftY,
            rotate: 0,
            cx: guide.leftLeg.x + guide.leftLeg.width / 2,
            cy: guide.leftLeg.y + 8
          };
        }

        if (part === "rightLeg") {
          return {
            x: rightX,
            y: rightY,
            rotate: 0,
            cx: guide.rightLeg.x + guide.rightLeg.width / 2,
            cy: guide.rightLeg.y + 8
          };
        }

        return { x: 0, y: 0, rotate: 0, cx: 0, cy: 0 };
      }

      function withAnimationTransform(shape, draw) {
        const part = puppetPartForShape(shape);
        const transform = animationTransformForPart(part);

        if (!isPlaying || !part) {
          draw();
          return;
        }

        ctx.save();
        ctx.translate(transform.cx, transform.cy);
        ctx.rotate(transform.rotate);
        ctx.translate(-transform.cx + transform.x, -transform.cy + transform.y);
        draw();
        ctx.restore();
      }


      function clearSelection() {
        selectedIds = [];
      }

      function hasSelection() {
        return selectedIds.length > 0;
      }

      function selectedShapes() {
        const idSet = new Set(selectedIds);
        return orderedShapes().filter((shape) => idSet.has(shape.id));
      }

      function selectionBounds() {
        const items = selectedShapes();
        if (!items.length) return null;

        let minX = Infinity;
        let minY = Infinity;
        let maxX = -Infinity;
        let maxY = -Infinity;

        for (const shape of items) {
          const box = shapeBounds(shape);
          minX = Math.min(minX, box.x);
          minY = Math.min(minY, box.y);
          maxX = Math.max(maxX, box.x + box.width);
          maxY = Math.max(maxY, box.y + box.height);
        }

        return {
          x: minX,
          y: minY,
          width: Math.max(0, maxX - minX),
          height: Math.max(0, maxY - minY)
        };
      }

      function boxContainsBox(outer, inner) {
        return (
          inner.x >= outer.x &&
          inner.y >= outer.y &&
          inner.x + inner.width <= outer.x + outer.width &&
          inner.y + inner.height <= outer.y + outer.height
        );
      }

      function drawSelectionOverlay() {
        const box = selectionBounds();
        if (!box) return;

        ctx.save();
        ctx.setLineDash([8, 6]);
        ctx.lineWidth = 1.5;
        ctx.strokeStyle = "rgba(47, 101, 255, 0.9)";
        ctx.fillStyle = "rgba(47, 101, 255, 0.08)";
        ctx.fillRect(box.x - 4, box.y - 4, box.width + 8, box.height + 8);
        ctx.strokeRect(box.x - 4, box.y - 4, box.width + 8, box.height + 8);
        ctx.restore();
      }

      function drawSelectMarquee(shape) {
        if (!shape || shape.type !== "select-box") return;
        const box = normalizedBox(shape.geom);

        ctx.save();
        ctx.setLineDash([8, 6]);
        ctx.lineWidth = 1.5;
        ctx.strokeStyle = "rgba(47, 101, 255, 0.95)";
        ctx.fillStyle = "rgba(47, 101, 255, 0.07)";
        ctx.fillRect(box.x, box.y, box.width, box.height);
        ctx.strokeRect(box.x, box.y, box.width, box.height);
        ctx.restore();
      }

      function applySelectionBox(shape) {
        const box = normalizedBox(shape.geom);
        selectedIds = orderedShapes()
          .filter((item) => boxContainsBox(box, shapeBounds(item)))
          .map((item) => item.id);
      }


      function textLines(shape) {
        return String(shape.geom.text || "").split(/\r?\n/);
      }

      function textFont(shape) {
        const size = shape.geom.fontSize || 28;
        return `${size}px Excalifont, cursive`;
      }

      function textBounds(shape) {
        const size = shape.geom.fontSize || 28;
        const lines = textLines(shape);

        ctx.save();
        ctx.font = textFont(shape);
        const width = Math.max(1, ...lines.map((line) => ctx.measureText(line || " ").width));
        ctx.restore();

        return {
          x: shape.geom.x,
          y: shape.geom.y,
          width,
          height: Math.max(size, lines.length * size * 1.15)
        };
      }

      function seededOffset(seed, index) {
        let value = Math.imul((seed || 1) + index * 374761393, 668265263);
        value = (value ^ (value >>> 13)) >>> 0;
        return ((value % 1000) / 1000 - 0.5) * 0.7;
      }

      function drawTextShape(context, shape) {
        const size = shape.geom.fontSize || 28;
        const lines = textLines(shape);

        context.save();
        context.font = textFont(shape);
        context.textBaseline = "top";
        context.fillStyle = shape.options.stroke || "#222222";
        context.strokeStyle = shape.options.stroke || "#222222";
        context.lineWidth = Math.max(0.35, (shape.options.strokeWidth || 2) * 0.08);

        for (let i = 0; i < lines.length; i++) {
          const y = shape.geom.y + i * size * 1.15;
          const line = lines[i] || " ";

          context.globalAlpha = 0.92;
          context.fillText(line, shape.geom.x, y);

          context.globalAlpha = 0.24;
          context.strokeText(
            line,
            shape.geom.x + seededOffset(shape.options.seed, i * 2),
            y + seededOffset(shape.options.seed, i * 2 + 1)
          );
        }

        context.restore();
      }

      function makeShape(type, start, end, points, options) {
        if (type === "smart") {
          return {
            id: shapeId++,
            type,
            geom: { points: points.map(roundPoint) },
            options: { ...options },
            drawable: null
          };
        }

        return {
          id: shapeId++,
          type,
          geom: {
            x1: Math.round(start.x * 10) / 10,
            y1: Math.round(start.y * 10) / 10,
            x2: Math.round(end.x * 10) / 10,
            y2: Math.round(end.y * 10) / 10
          },
          options: { ...options },
          drawable: null
        };
      }

      function normalizedBox(geom) {
        const x = Math.min(geom.x1, geom.x2);
        const y = Math.min(geom.y1, geom.y2);
        const width = Math.abs(geom.x2 - geom.x1);
        const height = Math.abs(geom.y2 - geom.y1);
        return { x, y, width, height };
      }

      function buildDrawable(shape) {
        const opts = roughOptions(shape.options, shape.type);

        if (shape.type === "text") {
          return null;
        }

        if (shape.type === "rectangle") {
          const box = normalizedBox(shape.geom);
          return gen.rectangle(box.x, box.y, box.width, box.height, opts);
        }

        if (shape.type === "ellipse") {
          const box = normalizedBox(shape.geom);
          return gen.ellipse(
            box.x + box.width / 2,
            box.y + box.height / 2,
            box.width,
            box.height,
            opts
          );
        }

        if (shape.type === "line") {
          const g = shape.geom;
          return gen.line(g.x1, g.y1, g.x2, g.y2, opts);
        }

        if (shape.type === "curve") {
          const points = curveRenderablePoints(shape.geom.points);
          if (points.length < 2) return null;

          return gen.curve(points, {
            ...opts,
            fill: undefined,
            fillStyle: undefined,
            roughness: Math.min(opts.roughness, 0.85),
            bowing: Math.min(opts.bowing, 0.7),
            curveFitting: 0.82,
            curveTightness: 0.18
          });
        }

        if (shape.type === "smart") {
          const points = freehandRenderablePoints(shape.geom.points);
          if (points.length < 2) return null;

          return gen.curve(points, {
            ...opts,
            fill: undefined,
            fillStyle: undefined,
            roughness: Math.min(opts.roughness, 0.9),
            bowing: Math.min(opts.bowing, 0.8),
            curveFitting: 0.85,
            curveTightness: 0.15
          });
        }

        return null;
      }

      function isMeaningful(shape) {
        if (!shape) return false;

        if (shape.type === "text") {
          return Boolean(shape.geom && String(shape.geom.text || "").trim());
        }

        if (shape.type === "select-box") {
          const g = shape.geom;
          return Math.abs(g.x2 - g.x1) > 4 && Math.abs(g.y2 - g.y1) > 4;
        }

        if (shape.type === "smart" || shape.type === "curve") {
          return shape.geom.points.length > 1 && pathLength(shape.geom.points) > 3;
        }

        const g = shape.geom;
        const dx = g.x2 - g.x1;
        const dy = g.y2 - g.y1;

        if (shape.type === "line") {
          return Math.hypot(dx, dy) > 3;
        }

        return Math.abs(dx) > 3 && Math.abs(dy) > 3;
      }

          const curr = points[i];

          if (Math.hypot(curr[0] - prev[0], curr[1] - prev[1]) >= minDistance) {

          minY,
          maxX,

            Math.abs(y - minY),

      function drawBackground() {
        ctx.save();

        const w = viewWidth;
        const h = viewHeight;
        const spacing = 28;
        const crossHalf = 3.2;

        // Paper base
        ctx.fillStyle = "#fbfdff";
        ctx.fillRect(0, 0, w, h);

        // Very subtle horizontal notebook ruling
        ctx.strokeStyle = "rgba(95, 145, 210, 0.10)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let y = spacing; y < h; y += spacing) {
          ctx.moveTo(0, y + 0.5);
          ctx.lineTo(w, y + 0.5);
        }
        ctx.stroke();

        // Subtle cross pattern
        ctx.strokeStyle = "rgba(95, 145, 210, 0.095)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let y = spacing; y < h; y += spacing) {
          for (let x = spacing; x < w; x += spacing) {
            ctx.moveTo(x - crossHalf, y + 0.5);
            ctx.lineTo(x + crossHalf, y + 0.5);
            ctx.moveTo(x + 0.5, y - crossHalf);
            ctx.lineTo(x + 0.5, y + crossHalf);
          }
        }
        ctx.stroke();

        // Faint margin line for notebook feel
        ctx.strokeStyle = "rgba(120, 155, 205, 0.08)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(44.5, 0);
        ctx.lineTo(44.5, h);
        ctx.stroke();

        // Paper noise / fiber
        ctx.globalAlpha = 0.032;
        ctx.fillStyle = "#4b5b6d";
        const count = Math.floor((w * h) / 6500);
        let seed = 2166136261;

        for (let i = 0; i < count; i++) {
          seed ^= i + w;
          seed = Math.imul(seed, 16777619);
          const x = Math.abs(seed % Math.max(1, Math.floor(w)));

          seed ^= i + h;
          seed = Math.imul(seed, 16777619);
          const y = Math.abs(seed % Math.max(1, Math.floor(h)));

          const size = (seed & 3) === 0 ? 1.2 : 0.8;
          ctx.fillRect(x, y, size, size);
        }

        ctx.restore();
      }

      function redraw(previewShape = null) {
        drawBackground();
        drawPuppetGuide();

        for (const shape of orderedShapes()) {
          withAnimationTransform(shape, () => {
            if (shape.type === "text") {
              drawTextShape(ctx, shape);
              return;
            }

            if (!shape.drawable) {
              shape.drawable = buildDrawable(shape);
            }

            if (shape.drawable) {
              rc.draw(shape.drawable);
            }
          });
        }

        drawSelectionOverlay();

        if (previewShape) {
          if (previewShape.type === "text") {
            drawTextShape(ctx, previewShape);
            return;
          }

          if (previewShape.type === "select-box") {
            drawSelectMarquee(previewShape);
            return;
          }

          const previewDrawable = buildDrawable(previewShape);
          if (previewDrawable) {
            rc.draw(previewDrawable);
          }
        }
      }

      function save() {
        try {
          const serializable = shapes.map(({ id, type, geom, options }) => ({
            id,
            type,
            geom,
            options
          }));

          localStorage.setItem(STORAGE_KEY, JSON.stringify(serializable));
        } catch {
          // Drawing still works without persistence.
        }
      }

      function cloneShapeData(shape) {
        return {
          id: shape.id,
          type: shape.type,
          geom: JSON.parse(JSON.stringify(shape.geom)),
          options: JSON.parse(JSON.stringify(shape.options))
        };
      }

      function snapshotShapes() {
        return shapes.map(cloneShapeData);
      }

      function hydrateShape(shapeData) {
        const shape = {
          id: Number.isFinite(shapeData.id) ? shapeData.id : shapeId++,
          type: shapeData.type,
          geom: shapeData.geom,
          options: shapeData.options || currentOptions(newSeed()),
          drawable: null
        };

        shape.drawable = buildDrawable(shape);
        return shape;
      }

      function restoreSnapshot(snapshot) {
        shapes.length = 0;

        for (const shapeData of snapshot) {
          const shape = hydrateShape(shapeData);
          if (isMeaningful(shape)) {
            shapes.push(shape);
            shapeId = Math.max(shapeId, shape.id + 1);
          }
        }

        save();
        redraw();
      }

      function recordHistory(clearRedo = true) {
        historyStack.push(snapshotShapes());
        if (historyStack.length > 100) {
          historyStack.shift();
        }
        if (clearRedo) {
          redoStack.length = 0;
        }
      }

      function load() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return;

          const parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) return;

          for (const item of parsed) {
            if (!item || !item.type || !item.geom || !item.options) continue;

            const shape = hydrateShape(item);

            if (isMeaningful(shape)) {
              shapes.push(shape);
              shapeId = Math.max(shapeId, shape.id + 1);
            }
          }

          historyStack.length = 0;
        } catch {
          // Corrupt saved data should not break the playground.
        }
      }

      function resize() {
        dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 4));
        viewWidth = window.innerWidth;
        viewHeight = window.innerHeight;

        canvas.style.width = `${viewWidth}px`;
        canvas.style.height = `${viewHeight}px`;
        canvas.width = Math.round(viewWidth * dpr);
        canvas.height = Math.round(viewHeight * dpr);

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        rc = rough.canvas(canvas);

        redraw();
      }

      function canvasPoint(event) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: event.clientX - rect.left,
          y: event.clientY - rect.top
        };
      }

      function translateGeom(geom, dx, dy) {
        if (geom.points) {
          return {
            points: geom.points.map((point) => [
              Math.round((point[0] + dx) * 10) / 10,
              Math.round((point[1] + dy) * 10) / 10
            ])
          };
        }

        if (Object.prototype.hasOwnProperty.call(geom, "text")) {
          return {
            ...geom,
            x: Math.round((geom.x + dx) * 10) / 10,
            y: Math.round((geom.y + dy) * 10) / 10
          };
        }

        return {
          x1: Math.round((geom.x1 + dx) * 10) / 10,
          y1: Math.round((geom.y1 + dy) * 10) / 10,
          x2: Math.round((geom.x2 + dx) * 10) / 10,
          y2: Math.round((geom.y2 + dy) * 10) / 10
        };
      }

      function shapeBounds(shape) {
        if (shape.type === "text") {
          return textBounds(shape);
        }

        if (shape.geom.points) {
          const bounds = pointBounds(shape.geom.points);
          return {
            x: bounds.minX,
            y: bounds.minY,
            width: bounds.width,
            height: bounds.height
          };
        }

        return normalizedBox(shape.geom);
      }

      function expandedBoxContains(box, point, padding = 8) {
        return (
          point.x >= box.x - padding &&
          point.x <= box.x + box.width + padding &&
          point.y >= box.y - padding &&
          point.y <= box.y + box.height + padding
        );
      }

      function distanceToPolyline(point, points) {
        if (!points || points.length < 2) return Infinity;

        let best = Infinity;

        for (let i = 1; i < points.length; i++) {
          const a = points[i - 1];
          const b = points[i];
          const dx = b[0] - a[0];
          const dy = b[1] - a[1];
          const lengthSquared = dx * dx + dy * dy;

          let t = 0;
          if (lengthSquared > 0) {
            t = ((point.x - a[0]) * dx + (point.y - a[1]) * dy) / lengthSquared;
            t = Math.max(0, Math.min(1, t));
          }

          const x = a[0] + dx * t;
          const y = a[1] + dy * t;
          best = Math.min(best, Math.hypot(point.x - x, point.y - y));
        }

        return best;
      }

      function pointInShapeForDragging(shape, point) {
        const padding = Math.max(8, (shape.options.strokeWidth || 2) * 3);

        if (shape.type === "text") {
          return expandedBoxContains(textBounds(shape), point, 6);
        }

        if (shape.type === "rectangle") {
          const box = normalizedBox(shape.geom);
          if (!expandedBoxContains(box, point, padding)) return false;

          if (shape.options.fill) return true;

          const edgeDistance = Math.min(
            Math.abs(point.x - box.x),
            Math.abs(point.x - (box.x + box.width)),
            Math.abs(point.y - box.y),
            Math.abs(point.y - (box.y + box.height))
          );

          return edgeDistance <= padding;
        }

        if (shape.type === "ellipse") {
          const box = normalizedBox(shape.geom);
          const rx = Math.max(1, box.width / 2);
          const ry = Math.max(1, box.height / 2);
          const cx = box.x + rx;
          const cy = box.y + ry;
          const nx = (point.x - cx) / rx;
          const ny = (point.y - cy) / ry;
          const radius = Math.sqrt(nx * nx + ny * ny);

          if (shape.options.fill && radius <= 1.08) return true;

          const tolerance = padding / Math.max(1, Math.min(rx, ry));
          return Math.abs(radius - 1) <= tolerance;
        }

        if (shape.type === "line") {
          const g = shape.geom;
          return distancePointToLine(
            [point.x, point.y],
            [g.x1, g.y1],
            [g.x2, g.y2]
          ) <= padding;
        }

        if (shape.geom.points) {
          const box = shapeBounds(shape);
          if (!expandedBoxContains(box, point, padding)) return false;
          return distanceToPolyline(point, shape.geom.points) <= padding;
        }

        return false;
      }

      function hitTestShape(point) {
        const entries = orderedShapeEntries();

        for (let i = entries.length - 1; i >= 0; i--) {
          const { shape, index } = entries[i];
          if (pointInShapeForDragging(shape, point)) {
            return { shape, index };
          }
        }

        return null;
      }

      function autosizeTextEditor(editor) {
        editor.style.height = "auto";
        editor.style.width = "auto";
        editor.style.height = Math.max(42, editor.scrollHeight + 2) + "px";
        editor.style.width = Math.max(160, editor.scrollWidth + 18) + "px";
      }

      function openTextEditor(point) {
        const editor = document.createElement("textarea");
        editor.className = "text-editor";
        editor.spellcheck = false;
        editor.placeholder = "Text";
        editor.style.left = `${Math.round(point.x)}px`;
        editor.style.top = `${Math.round(point.y)}px`;
        document.body.appendChild(editor);

        const commit = () => {
          if (!editor.parentNode) return;

          const text = editor.value.trimEnd();
          editor.remove();

          if (!text.trim()) {
            redraw();
            return;
          }

          const shape = {
            id: shapeId++,
            type: "text",
            geom: {
              x: Math.round(point.x * 10) / 10,
              y: Math.round(point.y * 10) / 10,
              text,
              fontSize: 28
            },
            options: currentOptions(newSeed()),
            drawable: null
          };

          recordHistory();
          shapes.push(shape);
          save();
          redraw();
        };

        const cancel = () => {
          if (!editor.parentNode) return;
          editor.remove();
          redraw();
        };

        editor.addEventListener("input", () => autosizeTextEditor(editor));
        editor.addEventListener("keydown", (event) => {
          event.stopPropagation();

          if (event.key === "Escape") {
            event.preventDefault();
            cancel();
          }

          if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            commit();
          }
        });
        editor.addEventListener("blur", commit);

        requestAnimationFrame(() => {
          editor.focus();
          autosizeTextEditor(editor);
        });
      }

      function pushStrokePoint(point) {
        if (!activeDrag || activeDrag.tool !== "smart") return;

        const last = activeDrag.points[activeDrag.points.length - 1];
        if (!last || Math.hypot(point.x - last[0], point.y - last[1]) >= 3.5) {
          activeDrag.points.push([point.x, point.y]);
        }
      }

      function previewShape() {
        if (!activeDrag) return null;

        if (activeDrag.tool === "smart") {
          return makeShape(
            "smart",
            activeDrag.start,
            activeDrag.current,
            activeDrag.points,
            activeDrag.options
          );
        }

        if (activeDrag.tool === "select") {
          return {
            id: -1,
            type: "select-box",
            geom: {
              x1: Math.round(activeDrag.start.x * 10) / 10,
              y1: Math.round(activeDrag.start.y * 10) / 10,
              x2: Math.round(activeDrag.current.x * 10) / 10,
              y2: Math.round(activeDrag.current.y * 10) / 10
            },
            options: {}
          };
        }

        return null;
      }

      function onPointerDown(event) {
        if (event.button !== undefined && event.button !== 0) return;

        event.preventDefault();
        canvas.setPointerCapture(event.pointerId);

        const point = canvasPoint(event);

        if (currentTool === "text") {
          openTextEditor(point);
          return;
        }

        if (currentTool === "hand") {
          const hit = hitTestShape(point);

          if (!hit) {
            activeDrag = null;
            return;
          }

          const draggingSelection = selectedIds.includes(hit.shape.id) && selectedIds.length > 0;
          const dragShapes = draggingSelection
            ? shapes.filter((shape) => selectedIds.includes(shape.id))
            : [hit.shape];

          activeDrag = {
            pointerId: event.pointerId,
            tool: "hand",
            start: point,
            current: point,
            dragShapes,
            originalGeoms: dragShapes.map((shape) => ({
              id: shape.id,
              geom: JSON.parse(JSON.stringify(shape.geom))
            })),
            moved: false,
            historyRecorded: false
          };

          document.body.classList.add("dragging-shape");
          return;
        }

        if (currentTool === "select") {
          activeDrag = {
            pointerId: event.pointerId,
            tool: "select",
            start: point,
            current: point
          };
          redraw(previewShape());
          return;
        }

        const options = currentOptions(newSeed());

        activeDrag = {
          pointerId: event.pointerId,
          tool: "smart",
          start: point,
          current: point,
          options,
          points: [[point.x, point.y]]
        };

        redraw(previewShape());
      }

      function onPointerMove(event) {
        if (!activeDrag || activeDrag.pointerId !== event.pointerId) return;

        event.preventDefault();

        if (activeDrag.tool === "hand") {
          const point = canvasPoint(event);
          const dx = point.x - activeDrag.start.x;
          const dy = point.y - activeDrag.start.y;

          if (!activeDrag.historyRecorded && Math.hypot(dx, dy) > 1.5) {
            recordHistory();
            activeDrag.historyRecorded = true;
          }

          activeDrag.current = point;
          activeDrag.moved = Math.hypot(dx, dy) > 1.5;

          const originalById = new Map(activeDrag.originalGeoms.map((item) => [item.id, item.geom]));
          for (const shape of activeDrag.dragShapes) {
            const originalGeom = originalById.get(shape.id);
            shape.geom = translateGeom(originalGeom, dx, dy);
            shape.drawable = buildDrawable(shape);
          }

          redraw();
          return;
        }

        if (activeDrag.tool === "select") {
          activeDrag.current = canvasPoint(event);
          redraw(previewShape());
          return;
        }

        const events =
          typeof event.getCoalescedEvents === "function"
            ? event.getCoalescedEvents()
            : [event];

        for (const e of events) {
          const point = canvasPoint(e);
          activeDrag.current = point;
          pushStrokePoint(point);
        }

        redraw(previewShape());
      }

      function finishPointer(event) {
        if (!activeDrag || activeDrag.pointerId !== event.pointerId) return;

        event.preventDefault();

        try {
          canvas.releasePointerCapture(event.pointerId);
        } catch {
          // Pointer capture may already be released.
        }

        if (activeDrag.tool === "hand") {
          const moved = activeDrag.moved;
          activeDrag = null;
          document.body.classList.remove("dragging-shape");
          if (moved) save();
          redraw();
          return;
        }

        if (activeDrag.tool === "select") {
          const shape = previewShape();
          activeDrag = null;
          if (shape && isMeaningful(shape)) {
            applySelectionBox(shape);
          } else {
            clearSelection();
          }
          redraw();
          return;
        }

        let shape = previewShape();
        activeDrag = null;

        if (shape && shape.type === "smart") {
          if (tryApplySmartFill(shape)) {
            return;
          }
          shape = smartShapeFromStroke(shape);
        }

        if (isMeaningful(shape)) {
          recordHistory();
          shape.drawable = shape.drawable || buildDrawable(shape);
          shapes.push(shape);
          save();
        }

        redraw();
      }

      function cancelPointer(event) {
        if (!activeDrag || activeDrag.pointerId !== event.pointerId) return;
        activeDrag = null;
        document.body.classList.remove("dragging-shape");
        redraw();
      }

      function undo() {
        if (!historyStack.length) return;

        redoStack.push(snapshotShapes());
        if (redoStack.length > 100) {
          redoStack.shift();
        }

        const snapshot = historyStack.pop();
        restoreSnapshot(snapshot);
      }

      function redo() {
        if (!redoStack.length) return;

        historyStack.push(snapshotShapes());
        if (historyStack.length > 100) {
          historyStack.shift();
        }

        const snapshot = redoStack.pop();
        restoreSnapshot(snapshot);
      }

      function clearAll() {
        stopAnimation();
        if (!shapes.length) return;
        recordHistory();
        shapes.length = 0;
        save();
        redraw();
      }

      function downloadBlob(blob, filename) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.setTimeout(() => URL.revokeObjectURL(url), 1000);
      }

      function exportPNG() {
        const wasPlaying = isPlaying;
        if (wasPlaying) stopAnimation();
        canvas.toBlob((blob) => {
          if (blob) downloadBlob(blob, "rough-drawing.png");
        }, "image/png");
      }

      function makeSvgTextNode(shape) {
        const ns = "http://www.w3.org/2000/svg";
        const text = document.createElementNS(ns, "text");
        const size = shape.geom.fontSize || 28;

        text.setAttribute("x", String(shape.geom.x));
        text.setAttribute("y", String(shape.geom.y));
        text.setAttribute("fill", shape.options.stroke || "#222222");
        text.setAttribute("font-family", "Excalifont, cursive");
        text.setAttribute("font-size", String(size));
        text.setAttribute("dominant-baseline", "text-before-edge");

        const lines = textLines(shape);
        for (let i = 0; i < lines.length; i++) {
          const tspan = document.createElementNS(ns, "tspan");
          tspan.setAttribute("x", String(shape.geom.x));
          tspan.setAttribute("dy", i === 0 ? "0" : String(size * 1.15));
          tspan.textContent = lines[i] || " ";
          text.appendChild(tspan);
        }

        return text;
      }

      function makeSvgNode(rsvg, shape) {
        const opts = roughOptions(shape.options, shape.type);

        if (shape.type === "text") {
          return makeSvgTextNode(shape);
        }

        if (shape.type === "rectangle") {
          const box = normalizedBox(shape.geom);
          return rsvg.rectangle(box.x, box.y, box.width, box.height, opts);
        }

        if (shape.type === "ellipse") {
          const box = normalizedBox(shape.geom);
          return rsvg.ellipse(
            box.x + box.width / 2,
            box.y + box.height / 2,
            box.width,
            box.height,
            opts
          );
        }

        if (shape.type === "line") {
          const g = shape.geom;
          return rsvg.line(g.x1, g.y1, g.x2, g.y2, opts);
        }

        if (shape.type === "curve") {
          const points = curveRenderablePoints(shape.geom.points);
          if (points.length < 2) return null;

          return rsvg.curve(points, {
            ...opts,
            fill: undefined,
            fillStyle: undefined,
            roughness: Math.min(opts.roughness, 0.85),
            bowing: Math.min(opts.bowing, 0.7),
            curveFitting: 0.82,
            curveTightness: 0.18
          });
        }

        if (shape.type === "smart") {
          const points = freehandRenderablePoints(shape.geom.points);
          if (points.length < 2) return null;

          return rsvg.curve(points, {
            ...opts,
            fill: undefined,
            fillStyle: undefined,
            roughness: Math.min(opts.roughness, 0.9),
            bowing: Math.min(opts.bowing, 0.8),
            curveFitting: 0.85,
            curveTightness: 0.15
          });
        }

        return null;
      }

      function exportSVG() {
        const ns = "http://www.w3.org/2000/svg";
        const svg = document.createElementNS(ns, "svg");
        svg.setAttribute("xmlns", ns);
        svg.setAttribute("width", String(viewWidth));
        svg.setAttribute("height", String(viewHeight));
        svg.setAttribute("viewBox", `0 0 ${viewWidth} ${viewHeight}`);

        const defs = document.createElementNS(ns, "defs");
        const style = document.createElementNS(ns, "style");
        style.textContent = "@font-face { font-family: 'Excalifont'; src: url('https://excalidraw.nyc3.cdn.digitaloceanspaces.com/fonts/Excalifont-Regular.woff2') format('woff2'); }";
        defs.appendChild(style);
        svg.appendChild(defs);

        const pattern = document.createElementNS(ns, "pattern");
        pattern.setAttribute("id", "notebookPattern");
        pattern.setAttribute("patternUnits", "userSpaceOnUse");
        pattern.setAttribute("width", "28");
        pattern.setAttribute("height", "28");

        const patternBg = document.createElementNS(ns, "rect");
        patternBg.setAttribute("width", "28");
        patternBg.setAttribute("height", "28");
        patternBg.setAttribute("fill", "#fbfdff");
        pattern.appendChild(patternBg);

        const rule = document.createElementNS(ns, "line");
        rule.setAttribute("x1", "0");
        rule.setAttribute("y1", "27.5");
        rule.setAttribute("x2", "28");
        rule.setAttribute("y2", "27.5");
        rule.setAttribute("stroke", "rgba(95,145,210,0.10)");
        rule.setAttribute("stroke-width", "1");
        pattern.appendChild(rule);

        const crossH = document.createElementNS(ns, "line");
        crossH.setAttribute("x1", "10.5");
        crossH.setAttribute("y1", "14");
        crossH.setAttribute("x2", "17.5");
        crossH.setAttribute("y2", "14");
        crossH.setAttribute("stroke", "rgba(95,145,210,0.095)");
        crossH.setAttribute("stroke-width", "1");
        pattern.appendChild(crossH);

        const crossV = document.createElementNS(ns, "line");
        crossV.setAttribute("x1", "14");
        crossV.setAttribute("y1", "10.5");
        crossV.setAttribute("x2", "14");
        crossV.setAttribute("y2", "17.5");
        crossV.setAttribute("stroke", "rgba(95,145,210,0.095)");
        crossV.setAttribute("stroke-width", "1");
        pattern.appendChild(crossV);

        defs.appendChild(pattern);

        const bg = document.createElementNS(ns, "rect");
        bg.setAttribute("width", "100%");
        bg.setAttribute("height", "100%");
        bg.setAttribute("fill", "url(#notebookPattern)");
        svg.appendChild(bg);

        const margin = document.createElementNS(ns, "line");
        margin.setAttribute("x1", "44.5");
        margin.setAttribute("y1", "0");
        margin.setAttribute("x2", "44.5");
        margin.setAttribute("y2", String(viewHeight));
        margin.setAttribute("stroke", "rgba(120,155,205,0.08)");
        margin.setAttribute("stroke-width", "1");
        svg.appendChild(margin);

        const guide = puppetGuide();
        for (const box of [guide.body, guide.leftLeg, guide.rightLeg]) {
          const guideRect = document.createElementNS(ns, "rect");
          guideRect.setAttribute("x", String(box.x));
          guideRect.setAttribute("y", String(box.y));
          guideRect.setAttribute("width", String(box.width));
          guideRect.setAttribute("height", String(box.height));
          guideRect.setAttribute("fill", "rgba(45,83,135,0.018)");
          guideRect.setAttribute("stroke", "rgba(45,83,135,0.18)");
          guideRect.setAttribute("stroke-width", "1.2");
          guideRect.setAttribute("stroke-dasharray", "8 7");
          svg.appendChild(guideRect);
        }

        const rsvg = rough.svg(svg);

        for (const shape of orderedShapes()) {
          const node = makeSvgNode(rsvg, shape);
          if (node) svg.appendChild(node);
        }

        const xml = new XMLSerializer().serializeToString(svg);
        const blob = new Blob([`<?xml version="1.0" encoding="UTF-8"?>\n${xml}`], {
          type: "image/svg+xml;charset=utf-8"
        });

        downloadBlob(blob, "rough-drawing.svg");
      }


      function animationLoop(timestamp) {
        if (!isPlaying) return;
        if (!animationStart) animationStart = timestamp;
        redraw();
        animationFrameId = requestAnimationFrame(animationLoop);
      }

      function playAnimation() {
        if (isPlaying) return;
        isPlaying = true;
        animationStart = 0;
        controls.playBtn.classList.add("active");
        animationFrameId = requestAnimationFrame(animationLoop);
      }

      function stopAnimation() {
        isPlaying = false;
        animationStart = 0;
        controls.playBtn.classList.remove("active");

        if (animationFrameId !== null) {
          cancelAnimationFrame(animationFrameId);
          animationFrameId = null;
        }

        redraw();
      }

      function refreshControlLabels() {
        controls.roughnessValue.textContent = Number(controls.roughness.value).toFixed(1);
        controls.bowingValue.textContent = Number(controls.bowing.value).toFixed(1);
        controls.strokeWidthValue.textContent = Number(controls.strokeWidth.value).toFixed(1);
      }

      document.querySelectorAll(".tool").forEach((button) => {
        button.addEventListener("click", () => {
          currentTool = button.dataset.tool;
          if (currentTool === "smart") {
            clearSelection();
          }
          document.body.classList.toggle("hand-mode", currentTool === "hand");
          document.body.classList.toggle("text-mode", currentTool === "text");
          document.body.classList.toggle("select-mode", currentTool === "select");

          document.querySelectorAll(".tool").forEach((b) => {
            b.classList.toggle("active", b === button);
          });

          redraw();
        });
      });

      [
        controls.roughness,
        controls.bowing,
        controls.strokeWidth
      ].forEach((input) => {
        input.addEventListener("input", refreshControlLabels);
        input.addEventListener("change", refreshControlLabels);
      });

      controls.playBtn.addEventListener("click", playAnimation);
      controls.stopBtn.addEventListener("click", stopAnimation);
      controls.undoBtn.addEventListener("click", undo);
      controls.redoBtn.addEventListener("click", redo);
      controls.clearBtn.addEventListener("click", clearAll);
      controls.pngBtn.addEventListener("click", exportPNG);
      controls.svgBtn.addEventListener("click", exportSVG);

      document.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();

        if ((event.metaKey || event.ctrlKey) && key === "z" && !event.shiftKey) {
          event.preventDefault();
          undo();
        }

        if (
          ((event.metaKey || event.ctrlKey) && key === "z" && event.shiftKey) ||
          (event.ctrlKey && key === "y")
        ) {
          event.preventDefault();
          redo();
        }
      });

      canvas.addEventListener("pointerdown", onPointerDown);
      canvas.addEventListener("pointermove", onPointerMove);
      canvas.addEventListener("pointerup", finishPointer);
      canvas.addEventListener("pointercancel", cancelPointer);
      canvas.addEventListener("lostpointercapture", () => {
        if (activeDrag) {
          activeDrag = null;
          document.body.classList.remove("dragging-shape");
          redraw();
        }
      });

      window.addEventListener("resize", resize);

      if (document.fonts && document.fonts.load) {
        document.fonts.load("28px Excalifont")
          .then(() => redraw())
          .catch(() => console.warn('Excalifont failed to load; browser fallback will be used.'));
      }

      refreshControlLabels();
      load();
      resize();
    })();
  </script>
</body>
</html>
