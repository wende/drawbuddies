      function pointerDistance(point, center) {
        return Math.hypot(point.x - center.x, point.y - center.y);
      }

      function pointerAngle(point, center) {
        return Math.atan2(point.y - center.y, point.x - center.x);
      }

      function transformDragForSelection(tool, pointerId, point) {
        let dragShapes = selectedShapes();

        if (!dragShapes.length) {
          const hit = hitTestShape(point);
          if (!hit) return null;
          selectedIds = [hit.shape.id];
          dragShapes = [hit.shape];
        }

        const bounds = selectionBounds();
        if (!bounds) return null;
        const center = boxCenter(bounds);

        return {
          pointerId,
          tool,
          start: point,
          current: point,
          center,
          startDistance: Math.max(8, pointerDistance(point, center)),
          startAngle: pointerAngle(point, center),
          dragShapes,
          originalGeoms: dragShapes.map((shape) => ({
            id: shape.id,
            geom: clone(shape.geom)
          })),
          moved: false,
          historyRecorded: false
        };
      }

      function transformFromDrag(drag, point) {
        if (drag.tool === "scale") {
          return {
            type: "scale",
            center: drag.center,
            factor: Math.max(0.05, pointerDistance(point, drag.center) / drag.startDistance)
          };
        }

        return {
          type: "rotate",
          center: drag.center,
          angle: normalizeRotation(pointerAngle(point, drag.center) - drag.startAngle)
        };
      }

      function transformMoved(transform) {
        if (transform.type === "scale") return Math.abs(transform.factor - 1) > 0.015;
        return Math.abs(transform.angle) > 0.01;
      }

      function previewShape() {
        if (!activeDrag) return null;

        if (activeDrag.tool === "smart") {
          return makeShape(
            "smart",
            activeDrag.start,
            activeDrag.current,
            activeDrag.points,
            activeDrag.options
          );
        }

        if (activeDrag.tool === "select") {
          return {
            id: "select-box",
            type: "select-box",
            geom: {
              x1: round1(activeDrag.start.x),
              y1: round1(activeDrag.start.y),
              x2: round1(activeDrag.current.x),
              y2: round1(activeDrag.current.y)
            },
            options: {}
          };
        }

        return null;
      }

      function onPointerDown(event) {
        if (event.button !== undefined && event.button !== 0) return;

        event.preventDefault();
        canvas.setPointerCapture(event.pointerId);

        const point = canvasPoint(event);

        if (currentTool === "imagine") {
          openImaginePrompt(point);
          return;
        }

        if (currentTool === "text") {
          openTextEditor(point);
          return;
        }

        if (currentTool === "hand") {
          const hit = hitTestShape(point);

          if (!hit) {
            activeDrag = null;
            return;
          }

          const draggingSelection = selectedIds.includes(hit.shape.id) && selectedIds.length > 0;
          const dragShapes = draggingSelection
            ? shapes.filter((shape) => selectedIds.includes(shape.id))
            : [hit.shape];

          activeDrag = {
            pointerId: event.pointerId,
            tool: "hand",
            start: point,
            current: point,
            dragShapes,
            originalGeoms: dragShapes.map((shape) => ({
              id: shape.id,
              geom: clone(shape.geom)
            })),
            moved: false,
            historyRecorded: false
          };

          document.body.classList.add("dragging-shape");
          return;
        }

        if (isTransformTool(currentTool)) {
          activeDrag = transformDragForSelection(currentTool, event.pointerId, point);
          redraw();
          return;
        }

        if (currentTool === "select") {
          activeDrag = {
            pointerId: event.pointerId,
            tool: "select",
            start: point,
            current: point
          };
          redraw(previewShape());
          return;
        }

        const options = currentOptions(newSeed());

        activeDrag = {
          pointerId: event.pointerId,
          tool: "smart",
          start: point,
          current: point,
          options,
          points: [[point.x, point.y]]
        };

        redraw(previewShape());
      }

      function onPointerMove(event) {
        if (!activeDrag || activeDrag.pointerId !== event.pointerId) return;

        event.preventDefault();

        if (activeDrag.tool === "hand") {
          const point = canvasPoint(event);
          const dx = point.x - activeDrag.start.x;
          const dy = point.y - activeDrag.start.y;

          if (!activeDrag.historyRecorded && Math.hypot(dx, dy) > 1.5) {
            recordHistory();
            activeDrag.historyRecorded = true;
          }

          activeDrag.current = point;
          activeDrag.moved = Math.hypot(dx, dy) > 1.5;

          const originalById = new Map(activeDrag.originalGeoms.map((item) => [item.id, item.geom]));
          for (const shape of activeDrag.dragShapes) {
            const originalGeom = originalById.get(shape.id);
            shape.geom = translateGeom(originalGeom, dx, dy);
            shape.drawable = buildDrawable(shape);
          }

          redraw();
          return;
        }

        if (isTransformTool(activeDrag.tool)) {
          const point = canvasPoint(event);
          const transform = transformFromDrag(activeDrag, point);

          if (!activeDrag.historyRecorded && transformMoved(transform)) {
            recordHistory();
            activeDrag.historyRecorded = true;
          }

          activeDrag.current = point;
          activeDrag.moved = transformMoved(transform);

          const originalById = new Map(activeDrag.originalGeoms.map((item) => [item.id, item.geom]));
          for (const shape of activeDrag.dragShapes) {
            const originalGeom = originalById.get(shape.id);
            applyTransformFromOriginal(shape, originalGeom, transform);
            shape.drawable = buildDrawable(shape);
          }

          redraw();
          return;
        }

        if (activeDrag.tool === "select") {
          activeDrag.current = canvasPoint(event);
          redraw(previewShape());
          return;
        }

        const events =
          typeof event.getCoalescedEvents === "function"
            ? event.getCoalescedEvents()
            : [event];

        for (const e of events) {
          const point = canvasPoint(e);
          activeDrag.current = point;
          pushStrokePoint(point);
        }

        redraw(previewShape());
      }

      function finishPointer(event) {
        if (!activeDrag || activeDrag.pointerId !== event.pointerId) return;

        event.preventDefault();

        try {
          canvas.releasePointerCapture(event.pointerId);
        } catch {
          // Pointer capture may already be released.
        }

        if (activeDrag.tool === "hand") {
          const moved = activeDrag.moved;
          const dragShapes = activeDrag.dragShapes;
          const tw = 68, th = 78;
          const trashBounds = { x: 24, y: viewHeight - th - 88, width: tw, height: th };
          const screenCurrent = worldToScreen(activeDrag.current);
          const droppedOnTrash = moved && isOverBounds(screenCurrent, trashBounds);
          activeDrag = null;
          document.body.classList.remove("dragging-shape");
          if (droppedOnTrash) {
            for (const shape of dragShapes) {
              const idx = shapes.indexOf(shape);
              if (idx >= 0) shapes.splice(idx, 1);
              net.send({ type: "remove", id: shape.id });
            }
            selectedIds = selectedIds.filter((id) => !dragShapes.some((s) => s.id === id));
            save();
          } else if (moved) {
            save();
            for (const shape of dragShapes) {
              net.send({ type: "update", shape: serializeShape(shape) });
            }
          }
          redraw();
          return;
        }

        if (isTransformTool(activeDrag.tool)) {
          const moved = activeDrag.moved;
          const dragShapes = activeDrag.dragShapes;
          activeDrag = null;
          if (moved) {
            save();
            for (const shape of dragShapes) {
              net.send({ type: "update", shape: serializeShape(shape) });
            }
          }
          redraw();
          return;
        }

        if (activeDrag.tool === "select") {
          const shape = previewShape();
          activeDrag = null;
          if (shape && isMeaningful(shape)) {
            applySelectionBox(shape);
          } else {
            clearSelection();
          }
          redraw();
          return;
        }

        let shape = previewShape();
        activeDrag = null;

        if (shape && shape.type === "smart") {
          if (tryApplySmartFill(shape)) {
            return;
          }
          shape = smartShapeFromStroke(shape);
        }

        if (isMeaningful(shape)) {
          recordHistory();
          shape.drawable = shape.drawable || buildDrawable(shape);
          shapes.push(shape);
          save();
          net.send({ type: "add", shape: serializeShape(shape) });
        }

        redraw();
      }

      function cancelPointer(event) {
        if (!activeDrag || activeDrag.pointerId !== event.pointerId) return;
        activeDrag = null;
        document.body.classList.remove("dragging-shape");
        redraw();
      }

      function undo() {
        if (!historyStack.length) {
          if (!shapes.length) return;
          redoStack.push(snapshotShapes());
          shapes.pop();
          save();
          net.send({ type: "replace", shapes: shapes.map(serializeShape) });
          redraw();
          updateHistoryButtons();
          return;
        }

        redoStack.push(snapshotShapes());
        const snapshot = historyStack.pop();
        restoreSnapshot(snapshot);
        net.send({ type: "replace", shapes: shapes.map(serializeShape) });
        updateHistoryButtons();
      }

      function redo() {
        if (!redoStack.length) return;

        recordHistory(false);
        const snapshot = redoStack.pop();
        restoreSnapshot(snapshot);
        net.send({ type: "replace", shapes: shapes.map(serializeShape) });
        updateHistoryButtons();
      }

      function clearAll() {
        if (!shapes.length) return;
        recordHistory();
        shapes.length = 0;
        save();
        net.send({ type: "clear" });
        redraw();
      }

      // --- "Imagine": prompt -> Minimax SVG -> converter -> shapes -----------

      // LLM SVGs use a 512×512 viewBox with no client-side dimension cap; scale
      // down so imports don't dominate the canvas (users can scale up afterward).
      const IMAGINE_DEFAULT_SCALE = 0.5;

      // Boundary to public/svgtorough.js. Must return an array of shapes shaped
      // like { type, geom, options? } (id/options are filled in if omitted).
      function svgToShapes(svg) {
        if (typeof window.svgToShapes === "function") {
          return window.svgToShapes(svg);
        }
        throw new Error("SVG converter failed to load");
      }

      // Combined bounding box of a list of shapes in world coords (or null).
      function shapesBoundingBox(list) {
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        for (const shape of list) {
          const b = shapeBounds(shape);
          minX = Math.min(minX, b.x);
          minY = Math.min(minY, b.y);
          maxX = Math.max(maxX, b.x + b.width);
          maxY = Math.max(maxY, b.y + b.height);
        }
        return Number.isFinite(minX) ? { minX, minY, maxX, maxY } : null;
      }

      // Translate a batch so its combined bounding box centers on `target` (world).
      // Reuses translateGeom so every geom form (incl. path ox/oy) shifts correctly.
      function centerShapesAt(list, target) {
        const box = shapesBoundingBox(list);
        if (!box) return;
        const dx = target.x - (box.minX + box.maxX) / 2;
        const dy = target.y - (box.minY + box.maxY) / 2;
        for (const shape of list) shape.geom = translateGeom(shape.geom, dx, dy);
      }

      function viewCenter() {
        const cam = cameraOffset();
        return { x: cam.x + viewWidth / 2, y: cam.y + viewHeight / 2 };
      }

      // Bundle the converter's shapes into a single "group" so the whole imagined
      // drawing behaves as one object (select/move/delete/undo as a unit), then
      // center it in view, insert it, and sync to peers — all as one undo step.
      function addImaginedShapes(incoming, target) {
        const children = (incoming || [])
          .filter((s) => s && s.geom && typeof s.type === "string")
          .map((s) => ({
            type: s.type,
            geom: s.geom,
            options: s.options || currentOptions(newSeed())
          }))
          .slice(0, 500);
        if (!children.length) return 0;

        const group = {
          id: newId(),
          type: "group",
          geom: { ox: 0, oy: 0, scale: IMAGINE_DEFAULT_SCALE, children },
          options: currentOptions(newSeed()),
          drawable: null
        };

        centerShapesAt([group], target || viewCenter());

        recordHistory();
        group.drawable = buildDrawable(group);
        shapes.push(group);
        net.send({ type: "add", shape: serializeShape(group) });
        save();
        redraw();
        return children.length;
      }

      // --- Inline prompt (opens where the user clicked in "Imagine" mode) -------

      let imaginePromptEl = null;

      function closeImaginePrompt() {
        if (imaginePromptEl) {
          imaginePromptEl.remove();
          imaginePromptEl = null;
        }
      }

      function openImaginePrompt(point) {
        closeImaginePrompt();

        const wrap = document.createElement("div");
        wrap.className = "imagine-prompt";
        const screen = worldToScreen(point);
        const left = Math.max(12, Math.min(screen.x, viewWidth - 360));
        const top = Math.max(12, Math.min(screen.y, viewHeight - 60));
        wrap.style.left = `${Math.round(left)}px`;
        wrap.style.top = `${Math.round(top)}px`;
        wrap.style.bottom = "auto";
        wrap.style.transform = "none";

        const input = document.createElement("input");
        input.type = "text";
        input.placeholder = "Describe something to draw…";
        input.maxLength = 500;
        wrap.append(input);
        document.body.appendChild(wrap);
        imaginePromptEl = wrap;

        const submit = () => {
          const prompt = input.value.trim();
          if (!prompt) return;
          closeImaginePrompt();
          startImagine(prompt, point);
        };

        input.addEventListener("keydown", (event) => {
          event.stopPropagation();
          if (event.key === "Enter") {
            event.preventDefault();
            submit();
          }
          if (event.key === "Escape") {
            event.preventDefault();
            closeImaginePrompt();
          }
        });
        input.addEventListener("blur", () => {
          if (!input.value.trim()) closeImaginePrompt();
        });

        requestAnimationFrame(() => input.focus());
      }

      // --- Async generation: spinning placeholder anchored in world space -------
      // Generation runs in the background, so the user can keep drawing/moving
      // while one or more imaginings are in flight.

      const pendingImagines = [];
      let imagineFrameId = null;

      function imagineTick() {
        imagineFrameId = null;
        if (!pendingImagines.length) return;
        redraw(previewShape());
        imagineFrameId = requestAnimationFrame(imagineTick);
      }

      function ensureImagineLoop() {
        if (imagineFrameId === null && pendingImagines.length) {
          imagineFrameId = requestAnimationFrame(imagineTick);
        }
      }

      function stopImagineLoopIfIdle() {
        if (!pendingImagines.length && imagineFrameId !== null) {
          cancelAnimationFrame(imagineFrameId);
          imagineFrameId = null;
        }
      }

      function removePending(id) {
        const idx = pendingImagines.findIndex((p) => p.id === id);
        if (idx === -1) return false;
        pendingImagines.splice(idx, 1);
        return true;
      }

      // A hand-drawn rough.js arc that spins in place while generating.
      function drawImagineSpinners(now) {
        const r = 26;
        const angle = (now / 600) % (Math.PI * 2);
        for (const pending of pendingImagines) {
          ctx.save();
          ctx.translate(pending.x, pending.y);
          ctx.rotate(angle);
          rc.arc(0, 0, r * 2, r * 2, -Math.PI / 2, Math.PI, false, {
            stroke: "#7a5cff",
            strokeWidth: 3,
            roughness: 1.8,
            bowing: 2,
            seed: pending.seed
          });
          ctx.restore();
        }
      }

      function flashImagineError(point, message) {
        const screen = worldToScreen(point);
        const toast = document.createElement("div");
        toast.className = "imagine-toast";
        toast.textContent = message;
        toast.style.left = `${Math.round(Math.max(12, Math.min(screen.x, viewWidth - 200)))}px`;
        toast.style.top = `${Math.round(Math.max(12, Math.min(screen.y, viewHeight - 40)))}px`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2600);
      }

      function startImagine(prompt, point) {
        const pending = {
          id: newId(),
          x: point.x,
          y: point.y,
          seed: newSeed()
        };
        pendingImagines.push(pending);
        ensureImagineLoop();
        redraw();

        fetchImagineSvg(prompt)
          .then((svg) => {
            if (!removePending(pending.id)) return; // already cancelled
            const count = addImaginedShapes(svgToShapes(svg), { x: pending.x, y: pending.y });
            if (!count) flashImagineError(pending, "Nothing to draw from that");
          })
          .catch((err) => {
            if (!removePending(pending.id)) return;
            flashImagineError(pending, (err && err.message) || "Imagine failed");
          })
          .finally(() => {
            stopImagineLoopIfIdle();
            redraw();
          });
      }

      async function fetchImagineSvg(prompt) {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 50000);

        let res;
        try {
          res = await fetch("/imagine", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt }),
            signal: controller.signal
          });
        } catch (err) {
          throw new Error(err && err.name === "AbortError" ? "Timed out" : "Network error");
        } finally {
          clearTimeout(timeout);
        }

        if (!res.ok) {
          let msg = "Request failed";
          try {
            const body = await res.json();
            if (body && body.error) msg = body.error;
          } catch {}
          throw new Error(msg);
        }

        const { svg } = await res.json();
        if (!svg) throw new Error("No SVG returned");
        return svg;
      }

      function downloadBlob(blob, filename) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.setTimeout(() => URL.revokeObjectURL(url), 1000);
      }

      function exportPNG() {
        canvas.toBlob((blob) => {
          if (blob) downloadBlob(blob, "drawbuddies.png");
        }, "image/png");
      }

      function makeSvgTextNode(shape) {
        const ns = "http://www.w3.org/2000/svg";
        const text = document.createElementNS(ns, "text");
        const size = shape.geom.fontSize || 28;

        text.setAttribute("x", String(shape.geom.x));
        text.setAttribute("y", String(shape.geom.y));
        text.setAttribute("fill", shape.options.stroke || "#222222");
        text.setAttribute("font-family", "Excalifont, cursive");
        text.setAttribute("font-size", String(size));
        text.setAttribute("dominant-baseline", "text-before-edge");

        const lines = textLines(shape);
        for (let i = 0; i < lines.length; i++) {
          const tspan = document.createElementNS(ns, "tspan");
          tspan.setAttribute("x", String(shape.geom.x));
          tspan.setAttribute("dy", i === 0 ? "0" : String(size * 1.15));
          tspan.textContent = lines[i] || " ";
          text.appendChild(tspan);
        }

        return text;
      }

      function applySvgRotation(node, shape) {
        const rotation = shapeRotation(shape);
        if (!node || !rotation || !canStoreRotation(shape)) return node;
        const center = boxCenter(shapeBaseBounds(shape));
        node.setAttribute(
          "transform",
          `rotate(${(rotation * 180) / Math.PI} ${center.x} ${center.y})`
        );
        return node;
      }

      function makeSvgNode(rsvg, shape) {
        const ns = "http://www.w3.org/2000/svg";
        let node = shape.type === "text" ? makeSvgTextNode(shape) : buildRoughShape(rsvg, shape);

        if (node && shape.type === "path" && (shape.geom.ox || shape.geom.oy)) {
          const group = document.createElementNS(ns, "g");
          group.setAttribute(
            "transform",
            `translate(${shape.geom.ox || 0} ${shape.geom.oy || 0})`
          );
          group.appendChild(node);
          node = group;
        }

        return applySvgRotation(node, shape);
      }

      function exportSVG() {
        const ns = "http://www.w3.org/2000/svg";
        const svg = document.createElementNS(ns, "svg");
        const camera = cameraOffset();
        svg.setAttribute("xmlns", ns);
        svg.setAttribute("width", String(viewWidth));
        svg.setAttribute("height", String(viewHeight));
        svg.setAttribute("viewBox", `${camera.x} ${camera.y} ${viewWidth} ${viewHeight}`);

        const defs = document.createElementNS(ns, "defs");
        const style = document.createElementNS(ns, "style");
        style.textContent = "@font-face { font-family: 'Excalifont'; src: url('https://excalidraw.nyc3.cdn.digitaloceanspaces.com/fonts/Excalifont-Regular.woff2') format('woff2'); }";
        defs.appendChild(style);
        svg.appendChild(defs);

        const bg = document.createElementNS(ns, "rect");
        bg.setAttribute("x", String(camera.x));
        bg.setAttribute("y", String(camera.y));
        bg.setAttribute("width", "100%");
        bg.setAttribute("height", "100%");
        bg.setAttribute("fill", "#fbfdff");
        svg.appendChild(bg);

        const rsvg = rough.svg(svg);

        for (const shape of orderedShapes()) {
          const node = makeSvgNode(rsvg, shape);
          if (node) svg.appendChild(node);
        }

        const xml = new XMLSerializer().serializeToString(svg);
        const blob = new Blob([`<?xml version="1.0" encoding="UTF-8"?>\n${xml}`], {
          type: "image/svg+xml;charset=utf-8"
        });

        downloadBlob(blob, "drawbuddies.svg");
      }

      const avatarEditor = (() => {
        const overlay = document.getElementById("avatarOverlay");
        const editorCanvas = document.getElementById("avatarCanvas");
        const editorCtx = editorCanvas.getContext("2d", { alpha: false });
        let editorRc = rough.canvas(editorCanvas);
        const editorGen = rough.generator();
        const editorShapes = [];
        const editorUndoStack = [];
        const editorRedoStack = [];
        let editorTool = "smart";
        let editorActiveDrag = null;
        let editorSelectedIds = [];
        let editorPlaying = false;
        let editorAnimationFrame = null;

        const editorControls = {
          strokeColor: document.getElementById("avatarStrokeColor"),
          roughness: document.getElementById("avatarRoughness"),
          roughnessValue: document.getElementById("avatarRoughnessValue"),
          bowing: document.getElementById("avatarBowing"),
          bowingValue: document.getElementById("avatarBowingValue"),
          strokeWidth: document.getElementById("avatarStrokeWidth"),
          strokeWidthValue: document.getElementById("avatarStrokeWidthValue"),
          undoBtn: document.getElementById("avatarUndoBtn"),
          redoBtn: document.getElementById("avatarRedoBtn"),
          playBtn: document.getElementById("avatarPlayBtn"),
          clearBtn: document.getElementById("avatarClearBtn"),
          cancelBtn: document.getElementById("avatarCancelBtn"),
          okayBtn: document.getElementById("avatarOkayBtn")
        };

        function editorOptions(seed = newSeed()) {
          return {
            stroke: editorControls.strokeColor.value,
            fill: null,
            fillStyle: "hachure",
            roughness: clampNumber(editorControls.roughness.value, 1.5),
            bowing: clampNumber(editorControls.bowing.value, 1),
            strokeWidth: clampNumber(editorControls.strokeWidth.value, 2),
            seed
          };
        }

        function buildEditorDrawable(shape) {
          return shape.type === "text" ? null : buildRoughShape(editorGen, shape);
        }

        function snapshotEditor() {
          return editorShapes.map(cloneShapeData);
        }

        function updateEditorHistoryButtons() {
          editorControls.undoBtn.disabled = !editorUndoStack.length;
          editorControls.redoBtn.disabled = !editorRedoStack.length;
        }

        // Record the state prior to a mutation. Pass an explicit snapshot when the
        // shapes have already been mutated (e.g. a drag captured at pointer down).
        function recordEditorHistory(snapshot = snapshotEditor()) {
          editorUndoStack.push(snapshot);
          if (editorUndoStack.length > 100) editorUndoStack.shift();
          editorRedoStack.length = 0;
          updateEditorHistoryButtons();
        }

        function restoreEditorSnapshot(snapshot) {
          editorShapes.length = 0;
          editorShapes.push(...hydrateShapeList(snapshot));
          const ids = new Set(editorShapes.map((shape) => shape.id));
          editorSelectedIds = editorSelectedIds.filter((id) => ids.has(id));
        }

        function undoEditor() {
          if (!editorUndoStack.length) return;
          stopPreview();
          editorRedoStack.push(snapshotEditor());
          restoreEditorSnapshot(editorUndoStack.pop());
          updateEditorHistoryButtons();
          drawEditor();
        }

        function redoEditor() {
          if (!editorRedoStack.length) return;
          stopPreview();
          editorUndoStack.push(snapshotEditor());
          restoreEditorSnapshot(editorRedoStack.pop());
          updateEditorHistoryButtons();
          drawEditor();
        }

        function editorOrderedShapes() {
          return editorShapes
            .map((shape, index) => ({ shape, index, rank: shapeZRank(shape) }))
            .sort((a, b) => {
              if (a.rank !== b.rank) return a.rank - b.rank;
              return a.index - b.index;
            })
            .map((entry) => entry.shape);
        }

        function editorPoint(event) {
          const rect = editorCanvas.getBoundingClientRect();
          return {
            x: ((event.clientX - rect.left) / rect.width) * AVATAR_FRAME.width,
            y: ((event.clientY - rect.top) / rect.height) * AVATAR_FRAME.height
          };
        }

        function editorPointToScreen(point) {
          const rect = editorCanvas.getBoundingClientRect();
          return {
            x: rect.left + (point.x / AVATAR_FRAME.width) * rect.width,
            y: rect.top + (point.y / AVATAR_FRAME.height) * rect.height
          };
        }

        function editorSelectedShapes() {
          const selected = new Set(editorSelectedIds);
          return editorOrderedShapes().filter((shape) => selected.has(shape.id));
        }

        function editorSelectionBounds() {
          const items = editorSelectedShapes();
          if (!items.length) return null;

          let minX = Infinity;
          let minY = Infinity;
          let maxX = -Infinity;
          let maxY = -Infinity;

          for (const shape of items) {
            const box = shapeBounds(shape);
            minX = Math.min(minX, box.x);
            minY = Math.min(minY, box.y);
            maxX = Math.max(maxX, box.x + box.width);
            maxY = Math.max(maxY, box.y + box.height);
          }

          return { x: minX, y: minY, width: maxX - minX, height: maxY - minY };
        }

        function drawEditorSelection() {
          const box = editorSelectionBounds();
          if (!box) return;

          editorCtx.save();
          editorCtx.setLineDash([8, 6]);
          editorCtx.lineWidth = 1.5;
          editorCtx.strokeStyle = "rgba(47, 101, 255, 0.9)";
          editorCtx.fillStyle = "rgba(47, 101, 255, 0.08)";
          editorCtx.fillRect(box.x - 4, box.y - 4, box.width + 8, box.height + 8);
          editorCtx.strokeRect(box.x - 4, box.y - 4, box.width + 8, box.height + 8);
          editorCtx.restore();
        }

        function drawEditorSelectMarquee(shape) {
          const box = normalizedBox(shape.geom);
          editorCtx.save();
          editorCtx.setLineDash([8, 6]);
          editorCtx.lineWidth = 1.5;
          editorCtx.strokeStyle = "rgba(47, 101, 255, 0.95)";
          editorCtx.fillStyle = "rgba(47, 101, 255, 0.07)";
          editorCtx.fillRect(box.x, box.y, box.width, box.height);
          editorCtx.strokeRect(box.x, box.y, box.width, box.height);
          editorCtx.restore();
        }

        function drawEditorText(shape) {
          drawTextShape(editorCtx, shape);
        }

        function drawEditorShape(shape) {
          drawShapeOn(editorCtx, editorRc, buildEditorDrawable, shape);
        }

        function drawEditorBackground() {
          editorCtx.save();
          editorCtx.fillStyle = "#fbfdff";
          editorCtx.fillRect(0, 0, AVATAR_FRAME.width, AVATAR_FRAME.height);
          editorCtx.strokeStyle = "rgba(95, 145, 210, 0.10)";
          editorCtx.lineWidth = 1;
          editorCtx.beginPath();
          for (let y = 28; y < AVATAR_FRAME.height; y += 28) {
            editorCtx.moveTo(0, y + 0.5);
            editorCtx.lineTo(AVATAR_FRAME.width, y + 0.5);
          }
          editorCtx.stroke();
          editorCtx.restore();
        }

        function drawEditor(previewShape = null) {
          drawEditorBackground();
          drawPuppetGuide(editorCtx, avatarGuide());

          const { bob, swivel } = avatarSwivelTransform(editorPlaying);
          const cx = AVATAR_FRAME.width / 2;
          const cy = AVATAR_FRAME.height / 2;
          editorCtx.save();
          editorCtx.translate(cx, cy + bob);
          editorCtx.rotate(swivel);
          editorCtx.translate(-cx, -cy);

          for (const shape of editorOrderedShapes()) {
            drawEditorShape(shape);
          }

          editorCtx.restore();

          drawEditorSelection();

          if (previewShape) {
            if (previewShape.type === "text") {
              drawEditorText(previewShape);
            } else if (previewShape.type === "select-box") {
              drawEditorSelectMarquee(previewShape);
            } else {
              const drawable = buildEditorDrawable(previewShape);
              if (drawable) editorRc.draw(drawable);
            }
          }

          if (editorActiveDrag && editorActiveDrag.tool === "hand") {
            const etw = 40, eth = 46;
            const etx = AVATAR_FRAME.width / 2 - etw / 2;
            const ety = AVATAR_FRAME.height - eth - 10;
            const isHover = isOverBounds(editorActiveDrag.current, { x: etx, y: ety, width: etw, height: eth });
            drawTrashCan(editorCtx, editorRc, etx, ety, etw, eth, isHover);
          }

          updateOkayState();
        }

        function resizeEditorCanvas() {
          const rect = editorCanvas.getBoundingClientRect();
          const ratio = Math.max(1, Math.min(window.devicePixelRatio || 1, 4));
          const scale = Math.max(1, rect.width / AVATAR_FRAME.width);
          editorCanvas.width = Math.round(AVATAR_FRAME.width * scale * ratio);
          editorCanvas.height = Math.round(AVATAR_FRAME.height * scale * ratio);
          editorCtx.setTransform(scale * ratio, 0, 0, scale * ratio, 0, 0);
          editorRc = rough.canvas(editorCanvas);
          drawEditor();
        }

        function makeEditorShape(type, start, end, points, options) {
          if (type === "smart") {
            return {
              id: newId(),
              type,
              geom: { points: points.map(roundPoint) },
              options: { ...options },
              drawable: null
            };
          }

          return {
            id: newId(),
            type,
            geom: {
              x1: round1(start.x),
              y1: round1(start.y),
              x2: round1(end.x),
              y2: round1(end.y)
            },
            options: { ...options },
            drawable: null
          };
        }

        function editorPreviewShape() {
          if (!editorActiveDrag) return null;

          if (editorActiveDrag.tool === "smart") {
            return makeEditorShape(
              "smart",
              editorActiveDrag.start,
              editorActiveDrag.current,
              editorActiveDrag.points,
              editorActiveDrag.options
            );
          }

          if (editorActiveDrag.tool === "select") {
            return {
              id: "avatar-select-box",
              type: "select-box",
              geom: {
                x1: round1(editorActiveDrag.start.x),
                y1: round1(editorActiveDrag.start.y),
                x2: round1(editorActiveDrag.current.x),
                y2: round1(editorActiveDrag.current.y)
              },
              options: {}
            };
          }

          return null;
        }

        function editorHitTest(point) {
          const entries = editorShapes
            .map((shape, index) => ({ shape, index, rank: shapeZRank(shape) }))
            .sort((a, b) => {
              if (a.rank !== b.rank) return a.rank - b.rank;
              return a.index - b.index;
            });

          for (let i = entries.length - 1; i >= 0; i--) {
            const { shape, index } = entries[i];
            if (pointInShapeForDragging(shape, point)) {
              return { shape, index };
            }
          }

          return null;
        }

        function applyEditorSelection(shape) {
          const box = normalizedBox(shape.geom);
          editorSelectedIds = editorOrderedShapes()
            .filter((item) => boxContainsBox(box, shapeBounds(item)))
            .map((item) => item.id);
        }

        function pushEditorStrokePoint(point) {
          if (!editorActiveDrag || editorActiveDrag.tool !== "smart") return;
          const last = editorActiveDrag.points[editorActiveDrag.points.length - 1];
          if (!last || Math.hypot(point.x - last[0], point.y - last[1]) >= 3.5) {
            editorActiveDrag.points.push([point.x, point.y]);
          }
        }

        function editorTransformDragForSelection(tool, pointerId, point) {
          let dragShapes = editorSelectedShapes();

          if (!dragShapes.length) {
            const hit = editorHitTest(point);
            if (!hit) return null;
            editorSelectedIds = [hit.shape.id];
            dragShapes = [hit.shape];
          }

          const bounds = editorSelectionBounds();
          if (!bounds) return null;
          const center = boxCenter(bounds);

          return {
            pointerId,
            tool,
            start: point,
            current: point,
            center,
            startDistance: Math.max(8, pointerDistance(point, center)),
            startAngle: pointerAngle(point, center),
            dragShapes,
            originalGeoms: dragShapes.map((shape) => ({ id: shape.id, geom: clone(shape.geom) })),
            moved: false,
            preSnapshot: snapshotEditor()
          };
        }

        function tryApplyEditorFill(strokeShape) {
          const points = simplifyPoints(strokeShape.geom.points, 3.5);
          if (!points || points.length < 10) return false;

          let target = null;
          let bestScore = 0;
          for (let i = editorShapes.length - 1; i >= 0; i--) {
            const shape = editorShapes[i];
            if (shape.type !== "rectangle" && shape.type !== "ellipse") continue;
            let inside = 0;
            for (const point of points) {
              if (shapeContainsPoint(shape, point, 10)) inside++;
            }
            const ratio = inside / points.length;
            if (ratio > 0.92 && ratio > bestScore) {
              bestScore = ratio;
              target = shape;
            }
          }

          if (!target || !fillStrokeLooksIntentional(points, target)) return false;
          const fillStyle = chooseSmartFillStyle(target, points);
          if (!fillStyle) return false;

          recordEditorHistory();
          target.options.fill = editorControls.strokeColor.value;
          target.options.fillStyle = fillStyle;
          target.drawable = buildEditorDrawable(target);
          drawEditor();
          return true;
        }

        function openEditorText(point) {
          const editor = document.createElement("textarea");
          editor.className = "avatar-text-editor";
          editor.spellcheck = false;
          editor.placeholder = "Text";
          const screen = editorPointToScreen(point);
          editor.style.left = `${Math.round(screen.x)}px`;
          editor.style.top = `${Math.round(screen.y)}px`;
          document.body.appendChild(editor);

          const commit = () => {
            if (!editor.parentNode) return;
            const text = editor.value.trimEnd();
            editor.remove();
            if (!text.trim()) {
              drawEditor();
              return;
            }

            const shape = {
              id: newId(),
              type: "text",
              geom: {
                x: round1(point.x),
                y: round1(point.y),
                text,
                fontSize: 22
              },
              options: editorOptions(newSeed()),
              drawable: null
            };
            recordEditorHistory();
            editorShapes.push(shape);
            drawEditor();
          };

          const cancel = () => {
            if (!editor.parentNode) return;
            editor.remove();
            drawEditor();
          };

          editor.addEventListener("input", () => autosizeTextEditor(editor));
          editor.addEventListener("keydown", (event) => {
            event.stopPropagation();
            if (event.key === "Escape") {
              event.preventDefault();
              cancel();
            }
            if (event.key === "Enter" && !event.shiftKey) {
              event.preventDefault();
              commit();
            }
          });
          editor.addEventListener("blur", commit);

          requestAnimationFrame(() => {
            editor.focus();
            autosizeTextEditor(editor);
          });
        }

        function onEditorPointerDown(event) {
          if (event.button !== undefined && event.button !== 0) return;
          event.preventDefault();
          editorCanvas.setPointerCapture(event.pointerId);
          const point = editorPoint(event);

          if (editorTool === "text") {
            openEditorText(point);
            return;
          }

          if (editorTool === "hand") {
            const hit = editorHitTest(point);
            if (!hit) return;
            const draggingSelection = editorSelectedIds.includes(hit.shape.id) && editorSelectedIds.length > 0;
            const dragShapes = draggingSelection
              ? editorShapes.filter((shape) => editorSelectedIds.includes(shape.id))
              : [hit.shape];

            editorActiveDrag = {
              pointerId: event.pointerId,
              tool: "hand",
              start: point,
              current: point,
              dragShapes,
              originalGeoms: dragShapes.map((shape) => ({ id: shape.id, geom: clone(shape.geom) })),
              moved: false,
              preSnapshot: snapshotEditor()
            };
            return;
          }

          if (isTransformTool(editorTool)) {
            editorActiveDrag = editorTransformDragForSelection(editorTool, event.pointerId, point);
            drawEditor();
            return;
          }

          if (editorTool === "select") {
            editorActiveDrag = {
              pointerId: event.pointerId,
              tool: "select",
              start: point,
              current: point
            };
            drawEditor(editorPreviewShape());
            return;
          }

          editorActiveDrag = {
            pointerId: event.pointerId,
            tool: "smart",
            start: point,
            current: point,
            options: editorOptions(newSeed()),
            points: [[point.x, point.y]]
          };
          drawEditor(editorPreviewShape());
        }

        function onEditorPointerMove(event) {
          if (!editorActiveDrag || editorActiveDrag.pointerId !== event.pointerId) return;
          event.preventDefault();

          if (editorActiveDrag.tool === "hand") {
            const point = editorPoint(event);
            const dx = point.x - editorActiveDrag.start.x;
            const dy = point.y - editorActiveDrag.start.y;
            editorActiveDrag.current = point;
            editorActiveDrag.moved = Math.hypot(dx, dy) > 1.5;

            const originalById = new Map(editorActiveDrag.originalGeoms.map((item) => [item.id, item.geom]));
            for (const shape of editorActiveDrag.dragShapes) {
              const originalGeom = originalById.get(shape.id);
              shape.geom = translateGeom(originalGeom, dx, dy);
              shape.drawable = buildEditorDrawable(shape);
            }
            drawEditor();
            return;
          }

          if (isTransformTool(editorActiveDrag.tool)) {
            const point = editorPoint(event);
            const transform = transformFromDrag(editorActiveDrag, point);
            editorActiveDrag.current = point;
            editorActiveDrag.moved = transformMoved(transform);

            const originalById = new Map(editorActiveDrag.originalGeoms.map((item) => [item.id, item.geom]));
            for (const shape of editorActiveDrag.dragShapes) {
              const originalGeom = originalById.get(shape.id);
              applyTransformFromOriginal(shape, originalGeom, transform);
              shape.drawable = buildEditorDrawable(shape);
            }
            drawEditor();
            return;
          }

          if (editorActiveDrag.tool === "select") {
            editorActiveDrag.current = editorPoint(event);
            drawEditor(editorPreviewShape());
            return;
          }

          const events =
            typeof event.getCoalescedEvents === "function"
              ? event.getCoalescedEvents()
              : [event];
          for (const e of events) {
            const point = editorPoint(e);
            editorActiveDrag.current = point;
            pushEditorStrokePoint(point);
          }
          drawEditor(editorPreviewShape());
        }

        function finishEditorPointer(event) {
          if (!editorActiveDrag || editorActiveDrag.pointerId !== event.pointerId) return;
          event.preventDefault();
          try {
            editorCanvas.releasePointerCapture(event.pointerId);
          } catch {
            // Pointer capture may already be released.
          }

          if (editorActiveDrag.tool === "hand") {
            const dragShapes = editorActiveDrag.dragShapes;
            const moved = editorActiveDrag.moved;
            const preSnapshot = editorActiveDrag.preSnapshot;
            const etw = 40, eth = 46;
            const trashBounds = { x: AVATAR_FRAME.width / 2 - etw / 2, y: AVATAR_FRAME.height - eth - 10, width: etw, height: eth };
            const droppedOnTrash = moved && isOverBounds(editorActiveDrag.current, trashBounds);
            editorActiveDrag = null;
            if (moved || droppedOnTrash) {
              recordEditorHistory(preSnapshot);
            }
            if (droppedOnTrash) {
              for (const shape of dragShapes) {
                const idx = editorShapes.indexOf(shape);
                if (idx >= 0) editorShapes.splice(idx, 1);
              }
              editorSelectedIds = editorSelectedIds.filter((id) => !dragShapes.some((s) => s.id === id));
            }
            drawEditor();
            return;
          }

          if (isTransformTool(editorActiveDrag.tool)) {
            const moved = editorActiveDrag.moved;
            const preSnapshot = editorActiveDrag.preSnapshot;
            editorActiveDrag = null;
            if (moved) {
              recordEditorHistory(preSnapshot);
            }
            drawEditor();
            return;
          }

          if (editorActiveDrag.tool === "select") {
            const shape = editorPreviewShape();
            editorActiveDrag = null;
            if (shape && isMeaningful(shape)) {
              applyEditorSelection(shape);
            } else {
              editorSelectedIds = [];
            }
            drawEditor();
            return;
          }

          let shape = editorPreviewShape();
          editorActiveDrag = null;
          if (shape && shape.type === "smart") {
            if (tryApplyEditorFill(shape)) return;
            shape = smartShapeFromStroke(shape);
            shape.drawable = buildEditorDrawable(shape);
          }

          if (isMeaningful(shape)) {
            recordEditorHistory();
            editorShapes.push(shape);
          }
          drawEditor();
        }

        function cancelEditorPointer(event) {
          if (!editorActiveDrag || editorActiveDrag.pointerId !== event.pointerId) return;
          editorActiveDrag = null;
          drawEditor();
        }

        function updateControlLabels() {
          editorControls.roughnessValue.textContent = Number(editorControls.roughness.value).toFixed(1);
          editorControls.bowingValue.textContent = Number(editorControls.bowing.value).toFixed(1);
          editorControls.strokeWidthValue.textContent = Number(editorControls.strokeWidth.value).toFixed(1);
        }

        function updateOkayState() {
          editorControls.okayBtn.disabled = editorShapes.length === 0;
        }

        function stopPreview() {
          editorPlaying = false;
          avatarAnimationStart = 0;
          editorControls.playBtn.classList.remove("active");
          editorControls.playBtn.textContent = "Play";
          if (editorAnimationFrame !== null) {
            cancelAnimationFrame(editorAnimationFrame);
            editorAnimationFrame = null;
          }
        }

        function previewLoop() {
          if (!editorPlaying) return;
          drawEditor();
          editorAnimationFrame = requestAnimationFrame(previewLoop);
        }

        function togglePreview() {
          if (editorPlaying) {
            stopPreview();
            drawEditor();
            return;
          }

          editorPlaying = true;
          avatarAnimationStart = 0;
          editorControls.playBtn.classList.add("active");
          editorControls.playBtn.textContent = "Stop";
          editorAnimationFrame = requestAnimationFrame(previewLoop);
        }

        function clearDraft() {
          stopPreview();
          if (editorShapes.length) recordEditorHistory();
          editorShapes.length = 0;
          editorSelectedIds = [];
          drawEditor();
        }

        function close() {
          stopPreview();
          overlay.hidden = true;
          editorActiveDrag = null;
          pressedMovementKeys.clear();
        }

        function commit() {
          if (!editorShapes.length) return;
          localPlayer.avatar = hydrateAvatarShapeList(editorShapes.map(serializeShape));
          storeJson(AVATAR_STORAGE_KEY, localPlayer.avatar.map(serializeShape));
          net.sendPlayerSet();
          close();
          redraw();
        }

        function open() {
          stopPreview();
          editorShapes.length = 0;
          editorShapes.push(...hydrateAvatarShapeList(localPlayer.avatar.map(serializeShape)));
          editorSelectedIds = [];
          editorActiveDrag = null;
          editorUndoStack.length = 0;
          editorRedoStack.length = 0;
          overlay.hidden = false;
          updateControlLabels();
          updateEditorHistoryButtons();
          editorCanvas.classList.toggle("scale-mode", editorTool === "scale");
          editorCanvas.classList.toggle("rotate-mode", editorTool === "rotate");
          requestAnimationFrame(resizeEditorCanvas);
        }

        document.querySelectorAll(".avatar-tool").forEach((button) => {
          button.addEventListener("click", () => {
            editorTool = button.dataset.avatarTool;
            if (editorTool === "smart") {
              editorSelectedIds = [];
            }
            editorCanvas.classList.toggle("scale-mode", editorTool === "scale");
            editorCanvas.classList.toggle("rotate-mode", editorTool === "rotate");
            document.querySelectorAll(".avatar-tool").forEach((item) => {
              item.classList.toggle("active", item === button);
            });
            drawEditor();
          });
        });

        [
          editorControls.roughness,
          editorControls.bowing,
          editorControls.strokeWidth
        ].forEach((input) => {
          input.addEventListener("input", updateControlLabels);
          input.addEventListener("change", updateControlLabels);
        });

        editorControls.undoBtn.addEventListener("click", undoEditor);
        editorControls.redoBtn.addEventListener("click", redoEditor);
        editorControls.playBtn.addEventListener("click", togglePreview);
        editorControls.clearBtn.addEventListener("click", clearDraft);
        editorControls.cancelBtn.addEventListener("click", close);
        editorControls.okayBtn.addEventListener("click", commit);
        overlay.addEventListener("click", (event) => {
          if (event.target === overlay) close();
        });
        editorCanvas.addEventListener("pointerdown", onEditorPointerDown);
        editorCanvas.addEventListener("pointermove", onEditorPointerMove);
        editorCanvas.addEventListener("pointerup", finishEditorPointer);
        editorCanvas.addEventListener("pointercancel", cancelEditorPointer);
        window.addEventListener("resize", () => {
          if (!overlay.hidden) resizeEditorCanvas();
        });

        updateControlLabels();
        updateEditorHistoryButtons();
        return {
          open,
          close,
          undo: undoEditor,
          redo: redoEditor,
          isOpen() {
            return !overlay.hidden;
          }
        };
      })();

      function refreshControlLabels() {
        controls.roughnessValue.textContent = Number(controls.roughness.value).toFixed(1);
        controls.bowingValue.textContent = Number(controls.bowing.value).toFixed(1);
        controls.strokeWidthValue.textContent = Number(controls.strokeWidth.value).toFixed(1);
      }

      document.querySelectorAll(".tool").forEach((button) => {
        button.addEventListener("click", () => {
          currentTool = button.dataset.tool;
          if (currentTool === "smart") {
            clearSelection();
          }
          document.body.classList.toggle("hand-mode", currentTool === "hand");
          document.body.classList.toggle("text-mode", currentTool === "text");
          document.body.classList.toggle("select-mode", currentTool === "select");
          document.body.classList.toggle("scale-mode", currentTool === "scale");
          document.body.classList.toggle("rotate-mode", currentTool === "rotate");

          document.querySelectorAll(".tool").forEach((b) => {
            b.classList.toggle("active", b === button);
          });

          redraw();
        });
      });

      [
        controls.roughness,
        controls.bowing,
        controls.strokeWidth
      ].forEach((input) => {
        input.addEventListener("input", refreshControlLabels);
        input.addEventListener("change", refreshControlLabels);
      });

      controls.undoBtn.addEventListener("click", undo);
      controls.redoBtn.addEventListener("click", redo);
      controls.clearBtn.addEventListener("click", clearAll);
      controls.avatarBtn.addEventListener("click", () => avatarEditor.open());

      document.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();
        if (handleMovementKey(event, true)) return;

        if (avatarEditor.isOpen() && key === "escape") {
          event.preventDefault();
          avatarEditor.close();
          return;
        }

        if ((event.metaKey || event.ctrlKey) && key === "z" && !event.shiftKey) {
          event.preventDefault();
          if (avatarEditor.isOpen()) avatarEditor.undo();
          else undo();
        }

        if (
          (event.metaKey || event.ctrlKey) &&
          (key === "y" || (key === "z" && event.shiftKey))
        ) {
          event.preventDefault();
          if (avatarEditor.isOpen()) avatarEditor.redo();
          else redo();
        }
      });
      document.addEventListener("keyup", (event) => {
        handleMovementKey(event, false);
      });

      canvas.addEventListener("pointerdown", onPointerDown);
      canvas.addEventListener("pointermove", onPointerMove);
      canvas.addEventListener("pointerup", finishPointer);
      canvas.addEventListener("pointercancel", cancelPointer);
      canvas.addEventListener("lostpointercapture", () => {
        if (activeDrag) {
          activeDrag = null;
          document.body.classList.remove("dragging-shape");
          redraw();
        }
      });

      window.addEventListener("resize", resize);

      if (document.fonts && document.fonts.load) {
        document.fonts.load("28px Excalifont")
          .then(() => redraw())
          .catch(() => console.warn('Excalifont failed to load; browser fallback will be used.'));
      }

      refreshControlLabels();
      load();
      loadPlayerState();
      updateMovementHint();
      updateHistoryButtons();
      resize();
      net.connect();
    })();
  </script>
</body>
</html>
