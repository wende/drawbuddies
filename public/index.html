<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DrawBuddies — Collaborative Canvas</title>
  <link rel="preload" href="https://excalidraw.nyc3.cdn.digitaloceanspaces.com/fonts/Excalifont-Regular.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
  <style>
    @font-face {
      font-family: 'Excalifont';
      src: url('https://excalidraw.nyc3.cdn.digitaloceanspaces.com/fonts/Excalifont-Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --paper: #fbfdff;
      --ink: #201f1c;
      --panel: rgba(255, 252, 244, 0.88);
      --line: rgba(35, 32, 25, 0.16);
      --shadow: rgba(35, 32, 25, 0.16);
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 10%, rgba(255,255,255,0.55), transparent 24rem),
        radial-gradient(circle at 80% 90%, rgba(0,0,0,0.045), transparent 22rem),
        linear-gradient(135deg, rgba(0,0,0,0.018) 25%, transparent 25%) 0 0 / 18px 18px,
        var(--paper);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
      cursor: crosshair;
    }

    body.hand-mode #canvas {
      cursor: grab;
    }

    body.dragging-shape #canvas {
      cursor: grabbing;
    }

    body.text-mode #canvas {
      cursor: text;
    }

    body.select-mode #canvas {
      cursor: cell;
    }

    body.scale-mode #canvas {
      cursor: nwse-resize;
    }

    body.rotate-mode #canvas {
      cursor: alias;
    }

    .toolbar {
      position: fixed;
      left: 50%;
      bottom: 18px;
      z-index: 10;
      transform: translateX(-50%);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 8px;
      max-width: min(980px, calc(100vw - 24px));
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: 0 16px 50px var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      user-select: none;
    }

    .group {
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 34px;
      padding: 2px 4px;
    }

    .group + .group {
      border-left: 1px solid var(--line);
      padding-left: 10px;
    }

    button,
    input[type="color"] {
      color: var(--ink);
      border: 1px solid rgba(35, 32, 25, 0.18);
      border-radius: 11px;
      background: rgba(255, 255, 255, 0.58);
      font: inherit;
    }

    button {
      height: 30px;
      padding: 0 10px;
      cursor: pointer;
    }

    button:hover,
    input[type="color"]:hover {
      border-color: rgba(35, 32, 25, 0.36);
      background: rgba(255, 255, 255, 0.82);
    }

    button.active {
      color: #fffaf0;
      background: var(--ink);
      border-color: var(--ink);
    }

    button:active {
      transform: translateY(1px);
    }

    input[type="color"] {
      width: 34px;
      height: 30px;
      padding: 3px;
      cursor: pointer;
    }

    label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      font-size: 12px;
      color: rgba(32, 31, 28, 0.78);
    }

    input[type="range"] {
      width: 82px;
      accent-color: var(--ink);
    }

    .value {
      min-width: 2.4em;
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: rgba(32, 31, 28, 0.68);
    }

    .hint {
      position: fixed;
      left: 14px;
      top: 12px;
      z-index: 8;
      max-width: min(560px, calc(100vw - 28px));
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 252, 244, 0.74);
      color: rgba(32, 31, 28, 0.62);
      font-size: 12px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      pointer-events: none;
    }

    .topbar {
      position: fixed;
      right: 14px;
      top: 12px;
      z-index: 9;
      display: flex;
      align-items: center;
      gap: 8px;
      user-select: none;
    }

    .netstatus {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 252, 244, 0.82);
      color: rgba(32, 31, 28, 0.74);
      font-size: 12px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .netstatus .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #d23b3b;
      box-shadow: 0 0 0 0 rgba(210, 59, 59, 0.4);
      transition: background 0.3s, box-shadow 0.3s;
    }

    .netstatus .dot.connected {
      background: #2f9e44;
      box-shadow: 0 0 6px rgba(47, 158, 68, 0.7);
    }

    .avatar-button {
      height: 32px;
      padding: 0 13px;
      border-radius: 999px;
      background: rgba(255, 252, 244, 0.88);
      box-shadow: 0 10px 26px rgba(35, 32, 25, 0.12);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .move-hint {
      position: fixed;
      left: 50%;
      top: calc(50% + 92px);
      z-index: 7;
      transform: translateX(-50%);
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 252, 244, 0.76);
      color: rgba(32, 31, 28, 0.62);
      font-size: 12px;
      pointer-events: none;
      user-select: none;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .move-hint.hidden {
      opacity: 0;
      transform: translateX(-50%) translateY(4px);
    }

    .avatar-overlay {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(18, 17, 14, 0.28);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .avatar-overlay[hidden] {
      display: none;
    }

    .avatar-dialog {
      width: min(760px, calc(100vw - 24px));
      max-height: calc(100vh - 24px);
      display: grid;
      grid-template-columns: minmax(260px, 360px) minmax(260px, 1fr);
      align-items: stretch;
      gap: 12px;
      padding: 12px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 252, 244, 0.94);
      box-shadow: 0 24px 80px rgba(35, 32, 25, 0.26);
    }

    .avatar-stage {
      position: relative;
      overflow: hidden;
      width: 100%;
      max-width: 360px;
      justify-self: center;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fbfdff;
      aspect-ratio: 13 / 18;
      min-height: 360px;
    }

    #avatarCanvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: crosshair;
      touch-action: none;
    }

    #avatarCanvas.scale-mode {
      cursor: nwse-resize;
    }

    #avatarCanvas.rotate-mode {
      cursor: alias;
    }

    .avatar-text-editor {
      position: fixed;
      z-index: 40;
      min-width: 100px;
      min-height: 38px;
      padding: 4px 6px;
      border: 1px dashed rgba(35, 32, 25, 0.45);
      border-radius: 8px;
      outline: none;
      resize: both;
      overflow: hidden;
      background: rgba(255, 252, 244, 0.92);
      color: var(--ink);
      font-family: 'Excalifont', cursive;
      font-size: 22px;
      line-height: 1.15;
      box-shadow: 0 10px 28px rgba(35, 32, 25, 0.12);
    }

    .avatar-panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 0;
      min-height: 0;
    }

    .avatar-title {
      margin: 0;
      font-size: 16px;
      font-weight: 650;
      letter-spacing: 0;
      flex-shrink: 0;
    }

    .avatar-controls {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 0;
      min-width: 0;
      width: 100%;
      padding-top: 2px;
    }

    .avatar-tools-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      width: 100%;
      min-width: 0;
      flex-shrink: 0;
    }

    .avatar-tools-row > .group {
      display: contents;
    }

    .avatar-tools-row .group + .group {
      border-left: none;
      padding-left: 0;
    }

    .avatar-settings {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
      gap: 10px;
      min-height: 0;
    }

    .avatar-settings .group {
      min-height: 34px;
    }

    .avatar-settings label {
      width: 100%;
      justify-content: space-between;
    }

    .avatar-settings input[type="range"] {
      flex: 1;
      max-width: none;
      min-width: 72px;
    }

    .avatar-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      flex-shrink: 0;
      padding-top: 8px;
      width: 100%;
      min-width: 0;
    }

    .primary {
      color: #fffaf0;
      background: var(--ink);
      border-color: var(--ink);
    }

    button:disabled {
      opacity: 0.48;
      cursor: not-allowed;
      transform: none;
    }

    .text-editor {
      position: fixed;
      z-index: 20;
      min-width: 160px;
      min-height: 42px;
      padding: 4px 6px;
      border: 1px dashed rgba(35, 32, 25, 0.45);
      border-radius: 8px;
      outline: none;
      resize: both;
      overflow: hidden;
      background: rgba(255, 252, 244, 0.88);
      color: var(--ink);
      font-family: 'Excalifont', cursive;
      font-size: 28px;
      line-height: 1.15;
      box-shadow: 0 10px 28px rgba(35, 32, 25, 0.12);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .imagine-prompt {
      position: fixed;
      left: 50%;
      bottom: 72px;
      z-index: 30;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      max-width: min(560px, calc(100vw - 24px));
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      box-shadow: 0 16px 50px var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .imagine-prompt input {
      width: 320px;
      max-width: 60vw;
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      outline: none;
      background: rgba(255, 252, 244, 0.92);
      color: var(--ink);
      font: inherit;
    }

    .imagine-toast {
      position: fixed;
      z-index: 40;
      max-width: 220px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      color: #b3261e;
      font-family: 'Excalifont', cursive;
      font-size: 14px;
      box-shadow: 0 12px 36px var(--shadow);
      pointer-events: none;
    }

    @media (max-width: 760px) {
      .toolbar {
        bottom: 10px;
        justify-content: flex-start;
        overflow-x: auto;
        flex-wrap: nowrap;
        border-radius: 14px;
      }

      .group {
        flex: 0 0 auto;
      }

      .hint {
        display: none;
      }

      input[type="range"] {
        width: 70px;
      }

      .topbar {
        left: 10px;
        right: 10px;
        justify-content: flex-end;
      }

      .avatar-dialog {
        grid-template-columns: 1fr;
        overflow: auto;
      }

      .avatar-stage {
        min-height: 280px;
      }
    }
  </style>
</head>
<body>
  <canvas id="canvas" aria-label="Rough drawing canvas"></canvas>

  <div class="hint">
    Select creates a group from a rectangle. Move, Scale, and Rotate transform one shape or the current selection. Text adds Excalifont labels. Cmd/Ctrl+Z undo, Cmd/Ctrl+Shift+Z redo.
  </div>

  <div class="topbar">
    <div class="netstatus" aria-live="polite">
      <span class="dot" id="statusDot"></span>
      <span id="presence">Connecting…</span>
    </div>
    <button id="avatarBtn" class="avatar-button" type="button">Avatar</button>
  </div>

  <div id="moveHint" class="move-hint">WASD to move</div>

  <div class="toolbar" role="toolbar" aria-label="Drawing controls">
    <div class="group" aria-label="Tools">
      <button type="button" class="tool active" data-tool="smart">Draw</button>
      <button type="button" class="tool" data-tool="imagine">Imagine</button>
      <button type="button" class="tool" data-tool="select">Select</button>
      <button type="button" class="tool" data-tool="hand">Move</button>
      <button type="button" class="tool" data-tool="scale">Scale</button>
      <button type="button" class="tool" data-tool="rotate">Rotate</button>
      <button type="button" class="tool" data-tool="text">Text</button>
    </div>

    <div class="group">
      <label title="Color">
        Color
        <input id="strokeColor" type="color" value="#222222" />
      </label>
    </div>

    <div class="group">
      <label>
        Rough
        <input id="roughness" type="range" min="0" max="4" step="0.1" value="1.5" />
        <span id="roughnessValue" class="value">1.5</span>
      </label>

      <label>
        Bow
        <input id="bowing" type="range" min="0" max="10" step="0.1" value="1.0" />
        <span id="bowingValue" class="value">1.0</span>
      </label>

      <label>
        Width
        <input id="strokeWidth" type="range" min="1" max="14" step="0.5" value="2" />
        <span id="strokeWidthValue" class="value">2.0</span>
      </label>
    </div>

    <div class="group">
      <button id="undoBtn" type="button">Undo</button>
      <button id="redoBtn" type="button">Redo</button>
      <button id="clearBtn" type="button">Clear</button>
    </div>
  </div>

  <div id="avatarOverlay" class="avatar-overlay" hidden>
    <div class="avatar-dialog" role="dialog" aria-modal="true" aria-labelledby="avatarTitle">
      <div class="avatar-stage">
        <canvas id="avatarCanvas" aria-label="Avatar drawing canvas"></canvas>
      </div>
      <div class="avatar-panel">
        <h2 id="avatarTitle" class="avatar-title">Avatar</h2>
        <div class="avatar-controls" role="toolbar" aria-label="Avatar drawing controls">
          <div class="avatar-tools-row">
            <div class="group" aria-label="Avatar tools">
              <button type="button" class="avatar-tool active" data-avatar-tool="smart">Draw</button>
              <button type="button" class="avatar-tool" data-avatar-tool="select">Select</button>
              <button type="button" class="avatar-tool" data-avatar-tool="hand">Move</button>
              <button type="button" class="avatar-tool" data-avatar-tool="scale">Scale</button>
              <button type="button" class="avatar-tool" data-avatar-tool="rotate">Rotate</button>
              <button type="button" class="avatar-tool" data-avatar-tool="text">Text</button>
            </div>

            <div class="group" aria-label="Avatar history">
              <button id="avatarUndoBtn" type="button">Undo</button>
              <button id="avatarRedoBtn" type="button">Redo</button>
            </div>
          </div>

          <div class="avatar-settings">
            <div class="group">
              <label title="Color">
                Color
                <input id="avatarStrokeColor" type="color" value="#222222" />
              </label>
            </div>

            <div class="group">
              <label>
                Rough
                <input id="avatarRoughness" type="range" min="0" max="4" step="0.1" value="1.5" />
                <span id="avatarRoughnessValue" class="value">1.5</span>
              </label>
            </div>

            <div class="group">
              <label>
                Bow
                <input id="avatarBowing" type="range" min="0" max="10" step="0.1" value="1.0" />
                <span id="avatarBowingValue" class="value">1.0</span>
              </label>
            </div>

            <div class="group">
              <label>
                Width
                <input id="avatarStrokeWidth" type="range" min="1" max="14" step="0.5" value="2" />
                <span id="avatarStrokeWidthValue" class="value">2.0</span>
              </label>
            </div>
          </div>
        </div>

        <div class="avatar-actions">
          <button id="avatarPlayBtn" type="button">Play</button>
          <button id="avatarClearBtn" type="button">Clear</button>
          <button id="avatarCancelBtn" type="button">Cancel</button>
          <button id="avatarOkayBtn" class="primary" type="button">Okay</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/roughjs@4.6.6/bundled/rough.js"></script>
  <script src="svgtorough.js"></script>
  <script>
    (() => {
      "use strict";

      if (!window.rough) {
        document.body.innerHTML =
          '<p style="margin:2rem;font:16px system-ui">rough.js failed to load. Check your network connection.</p>';
        return;
      }

      const STORAGE_KEY = "drawbuddies:v2";
      const PLAYER_STATE_KEY = "drawbuddies:player:v1";
      const AVATAR_STORAGE_KEY = "drawbuddies:avatar:v1";
      const MOVE_HINT_KEY = "drawbuddies:movement-hint:v1";

      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d", { alpha: false });

      const controls = {
        strokeColor: document.getElementById("strokeColor"),
        roughness: document.getElementById("roughness"),
        roughnessValue: document.getElementById("roughnessValue"),
        bowing: document.getElementById("bowing"),
        bowingValue: document.getElementById("bowingValue"),
        strokeWidth: document.getElementById("strokeWidth"),
        strokeWidthValue: document.getElementById("strokeWidthValue"),
        avatarBtn: document.getElementById("avatarBtn"),
        undoBtn: document.getElementById("undoBtn"),
        redoBtn: document.getElementById("redoBtn"),
        clearBtn: document.getElementById("clearBtn")
      };

      const statusDot = document.getElementById("statusDot");
      const presenceEl = document.getElementById("presence");
      const moveHintEl = document.getElementById("moveHint");

      let rc = rough.canvas(canvas);
      const gen = rough.generator();

      let dpr = 1;
      let viewWidth = 0;
      let viewHeight = 0;
      let currentTool = "smart";
      let activeDrag = null;
      let selectedIds = [];
      let playerInitialized = false;
      let movementFrameId = null;
      let lastMoveTimestamp = 0;
      let lastPlayerBroadcast = 0;
      let lastBroadcastMoving = false;
      let avatarAnimationStart = 0;

      const shapes = [];
      const historyStack = [];
      const redoStack = [];
      const remotePlayers = new Map();
      const pressedMovementKeys = new Set();

      function storedJson(key, fallback = null) {
        try {
          const raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : fallback;
        } catch {
          return fallback;
        }
      }

      function storeJson(key, value) {
        try {
          localStorage.setItem(key, JSON.stringify(value));
        } catch {
          // Drawing still works without persistence.
        }
      }

      // ===== Globally-unique shape ids =====
      // Shape ids must be unique across all clients so concurrent authors never
      // collide. Integer counters would; UUID-ish strings won't.
      const PLAYER_ID =
        typeof crypto !== "undefined" && crypto.randomUUID
          ? crypto.randomUUID()
          : `player-${Date.now().toString(36)}-${Math.random().toString(36).slice(2)}`;
      const CLIENT_ID =
        typeof crypto !== "undefined" && crypto.randomUUID
          ? crypto.randomUUID().slice(0, 8)
          : PLAYER_ID.slice(0, 8);
      let idCounter = 0;
      const localPlayer = {
        id: PLAYER_ID,
        x: 0,
        y: 0,
        moving: false,
        facing: 1,
        avatar: []
      };

      function newId() {
        if (typeof crypto !== "undefined" && crypto.randomUUID) {
          return crypto.randomUUID();
        }
        return `${CLIENT_ID}-${Date.now().toString(36)}-${idCounter++}`;
      }

      function newSeed() {
        return typeof rough.newSeed === "function"
          ? rough.newSeed()
          : Math.floor(Math.random() * 2147483647);
      }

      function clampNumber(value, fallback) {
        const n = Number(value);
        return Number.isFinite(n) ? n : fallback;
      }

      // Round to one decimal — keeps geometry compact on the wire and in storage.
      function round1(n) {
        return Math.round(n * 10) / 10;
      }

      function roundPoint(point) {
        return [round1(point[0]), round1(point[1])];
      }

      function currentOptions(seed = newSeed()) {
        return {
          stroke: controls.strokeColor.value,
          fill: null,
          fillStyle: "hachure",
          roughness: clampNumber(controls.roughness.value, 1.5),
          bowing: clampNumber(controls.bowing.value, 1),
          strokeWidth: clampNumber(controls.strokeWidth.value, 2),
          seed
        };
      }

      function roughOptions(options, type) {
        const out = {
          stroke: options.stroke || "#222222",
          roughness: clampNumber(options.roughness, 1.5),
          bowing: clampNumber(options.bowing, 1),
          strokeWidth: clampNumber(options.strokeWidth, 2),
          seed: clampNumber(options.seed, 1)
        };

        if ((type === "rectangle" || type === "ellipse" || type === "path") && options.fill) {
          out.fill = options.fill;
          out.fillStyle = options.fillStyle || "hachure";
        }

        return out;
      }

      const AVATAR_FRAME = { width: 260, height: 360 };
      const AVATAR_DISPLAY_HEIGHT = 132;
      const PLAYER_SPEED = 220;

      function avatarOption(seed, stroke = "#222222", fill = null, fillStyle = "hachure") {
        return {
          stroke,
          fill,
          fillStyle,
          roughness: 1.35,
          bowing: 1,
          strokeWidth: 2.2,
          seed
        };
      }

      function defaultAvatarData() {
        return [
          {
            id: "default-head",
            type: "ellipse",
            geom: { x1: 101, y1: 34, x2: 159, y2: 92 },
            options: avatarOption(1301, "#222222", "#f4d7b6", "solid")
          },
          {
            id: "default-body",
            type: "rectangle",
            geom: { x1: 89, y1: 102, x2: 171, y2: 222 },
            options: avatarOption(1302, "#222222", "#a6d8ff", "hachure")
          },
          {
            id: "default-left-arm",
            type: "line",
            geom: { x1: 91, y1: 130, x2: 55, y2: 188 },
            options: avatarOption(1303)
          },
          {
            id: "default-right-arm",
            type: "line",
            geom: { x1: 169, y1: 130, x2: 205, y2: 188 },
            options: avatarOption(1304)
          },
          {
            id: "default-left-leg",
            type: "rectangle",
            geom: { x1: 91, y1: 238, x2: 121, y2: 328 },
            options: avatarOption(1305, "#222222", "#f7f2e8", "hachure")
          },
          {
            id: "default-right-leg",
            type: "rectangle",

      function shapeZRank(shape) {
        if (!shape || !shape.options || !shape.options.fill) {

        if (style === "solid") return 0;

        if (style === "cross-hatch") return 2;
        if (style === "hachure") return 3;

      function orderedShapeEntries() {
        return shapes
          .map((shape, index) => ({ shape, index, rank: shapeZRank(shape) }))
          .sort((a, b) => {
            if (a.rank !== b.rank) return a.rank - b.rank;
            return a.index - b.index;
          });

        return orderedShapeEntries().map((entry) => entry.shape);

      function cameraOffset() {
        return {
          x: localPlayer.x - viewWidth / 2,
          y: localPlayer.y - viewHeight / 2

        return {
          x: point.x + camera.x,
          y: point.y + camera.y

        return {
          x: point.x - camera.x,
          y: point.y - camera.y

      function avatarGuide() {
        const x = 20;
        const y = 20;
        const width = AVATAR_FRAME.width - 40;
        const height = AVATAR_FRAME.height - 40;
        const bodyHeight = height * (2 / 3);
        const legHeight = height - bodyHeight;
        const legWidth = width / 2;

        return {
          outer: { x, y, width, height },
          body: { x, y, width, height: bodyHeight },
          leftLeg: { x, y: y + bodyHeight, width: legWidth, height: legHeight },
          rightLeg: { x: x + legWidth, y: y + bodyHeight, width: legWidth, height: legHeight }
        };

      function drawPuppetGuide(context, guide) {
        context.save();

        context.fillStyle = "rgba(45, 83, 135, 0.018)";

          context.fillRect(box.x, box.y, box.width, box.height);
          context.strokeRect(box.x, box.y, box.width, box.height);
        }

        context.setLineDash([]);
        context.strokeStyle = "rgba(45, 83, 135, 0.10)";

      function boxCenter(box) {

          x: center.x + dx * cos - dy * sin,
          y: center.y + dx * sin + dy * cos

        return {
          x: center.x + (point.x - center.x) * factor,
          y: center.y + (point.y - center.y) * factor

      }

      function boxCorners(box) {
        return [
          { x: box.x, y: box.y },
          { x: box.x + box.width, y: box.y },
          { x: box.x + box.width, y: box.y + box.height },
          { x: box.x, y: box.y + box.height }
        ];

      function boundsFromPoints(points) {
        let minX = Infinity;
        let minY = Infinity;
        let maxX = -Infinity;
        let maxY = -Infinity;

        for (const point of points) {
          minX = Math.min(minX, point.x);
          minY = Math.min(minY, point.y);
          maxX = Math.max(maxX, point.x);
          maxY = Math.max(maxY, point.y);
        }

        return {
          x: minX,
          y: minY,
          width: Math.max(0, maxX - minX),
          height: Math.max(0, maxY - minY)

      function rotatedBoxBounds(box, angle) {
        if (!angle) return box;
        const center = boxCenter(box);
        return boundsFromPoints(boxCorners(box).map((point) => rotatePointObject(point, center, angle)));
      }

      function pointInShapeLocalSpace(shape, point) {
        const rotation = shapeRotation(shape);
        if (!rotation || !canStoreRotation(shape)) return point;
        return rotatePointObject(point, boxCenter(shapeBaseBounds(shape)), -rotation);
      }

      function avatarPartForShape(shape) {
        const box = shapeBounds(shape);
        const center = boxCenter(box);
        const guide = avatarGuide();

        if (pointInsideBox(center, guide.body)) return "body";
        if (pointInsideBox(center, guide.leftLeg)) return "leftLeg";
        if (pointInsideBox(center, guide.rightLeg)) return "rightLeg";
        return null;
      }

      function avatarSwivelTransform(moving) {
        if (!moving) return { bob: 0, swivel: 0 };

        if (!avatarAnimationStart) avatarAnimationStart = performance.now();
        const t = (performance.now() - avatarAnimationStart) / 1000;
        const phase = t * 1.65 * Math.PI * 2;

        return {
          bob: -Math.abs(Math.sin(phase)) * 5,
          swivel: Math.sin(phase) * 0.12 + Math.sin(phase * 2.7) * 0.012
        };
      }

      function drawShapeOn(context, rcInst, buildDrawableForShape, shape) {
        const pathOffset =
          shape.type === "path"
            ? { x: shape.geom.ox || 0, y: shape.geom.oy || 0 }
            : null;

        const draw = () => {
          if (shape.type === "text") {
            drawTextShape(context, shape);
            return;
          }

          if (!shape.drawable) {
            shape.drawable = buildDrawableForShape(shape);
          }

          if (shape.type === "group") {
            const drawables = Array.isArray(shape.drawable) ? shape.drawable : [];
            const ox = shape.geom.ox || 0;
            const oy = shape.geom.oy || 0;
            const scale = groupScale(shape.geom);
            const transformed = ox || oy || scale !== 1;
            if (transformed) {
              context.save();
              context.translate(ox, oy);
              context.scale(scale, scale);
            }
            for (const drawable of drawables) rcInst.draw(drawable);
            if (transformed) context.restore();
            return;
          }

          if (shape.drawable) {
            if (pathOffset && (pathOffset.x || pathOffset.y)) {
              context.save();
              context.translate(pathOffset.x, pathOffset.y);
              rcInst.draw(shape.drawable);
              context.restore();
              return;
            }

            rcInst.draw(shape.drawable);
          }
        };

        const rotation = shapeRotation(shape);
        if (rotation && canStoreRotation(shape)) {
          const center = boxCenter(shapeBaseBounds(shape));
          context.save();
          context.translate(center.x, center.y);
          context.rotate(rotation);
          context.translate(-center.x, -center.y);
          draw();
          context.restore();
          return;
        }

        draw();
      }

      function drawShapeWithCurrentTransform(shape) {
        drawShapeOn(ctx, rc, buildDrawable, shape);
      }

      function avatarFacingScale(player) {
        return player && player.facing === -1 ? -1 : 1;
      }

      function drawAvatarAt(player, screenX, screenY, moving) {
        const avatar = player.avatar && player.avatar.length ? player.avatar : hydrateAvatarShapeList(defaultAvatarData());
        const scale = AVATAR_DISPLAY_HEIGHT / AVATAR_FRAME.height;
        const { bob, swivel } = avatarSwivelTransform(moving);

        ctx.save();
        ctx.translate(screenX, screenY + bob);
        ctx.rotate(swivel);
        ctx.scale(avatarFacingScale(player), 1);
        ctx.translate(-(AVATAR_FRAME.width * scale) / 2, -(AVATAR_FRAME.height * scale) / 2);
        ctx.scale(scale, scale);

        for (const shape of avatar.slice().sort((a, b) => shapeZRank(a) - shapeZRank(b))) {
          drawShapeWithCurrentTransform(shape);
        }

        ctx.restore();
      }

      function drawPlayers() {
        for (const player of remotePlayers.values()) {
          if (!player || player.id === PLAYER_ID) continue;
          const point = worldToScreen({ x: player.x, y: player.y });
          if (
            point.x < -AVATAR_DISPLAY_HEIGHT ||
            point.x > viewWidth + AVATAR_DISPLAY_HEIGHT ||
            point.y < -AVATAR_DISPLAY_HEIGHT ||
            point.y > viewHeight + AVATAR_DISPLAY_HEIGHT
          ) {
            continue;
          }
          drawAvatarAt(player, point.x, point.y, player.moving);
        }

        drawAvatarAt(localPlayer, viewWidth / 2, viewHeight / 2, localPlayer.moving);
      }

      function clearSelection() {
        selectedIds = [];
      }

      function hasSelection() {
        return selectedIds.length > 0;
      }

      function selectedShapes() {
        const idSet = new Set(selectedIds);
        return orderedShapes().filter((shape) => idSet.has(shape.id));
      }

      function selectionBounds() {
        const items = selectedShapes();
        if (!items.length) return null;

        let minX = Infinity;
        let minY = Infinity;
        let maxX = -Infinity;
        let maxY = -Infinity;

        for (const shape of items) {
          const box = shapeBounds(shape);
          minX = Math.min(minX, box.x);
          minY = Math.min(minY, box.y);
          maxX = Math.max(maxX, box.x + box.width);
          maxY = Math.max(maxY, box.y + box.height);
        }

        return {
          x: minX,
          y: minY,
          width: Math.max(0, maxX - minX),
          height: Math.max(0, maxY - minY)
        };
      }

      function boxContainsBox(outer, inner) {
        return (
          inner.x >= outer.x &&
          inner.y >= outer.y &&
          inner.x + inner.width <= outer.x + outer.width &&
          inner.y + inner.height <= outer.y + outer.height
        );
      }

      function drawSelectionOverlay() {
        const box = selectionBounds();
        if (!box) return;

        ctx.save();
        ctx.setLineDash([8, 6]);
        ctx.lineWidth = 1.5;
        ctx.strokeStyle = "rgba(47, 101, 255, 0.9)";
        ctx.fillStyle = "rgba(47, 101, 255, 0.08)";
        ctx.fillRect(box.x - 4, box.y - 4, box.width + 8, box.height + 8);
        ctx.strokeRect(box.x - 4, box.y - 4, box.width + 8, box.height + 8);
        ctx.restore();
      }

      function drawSelectMarquee(shape) {
        if (!shape || shape.type !== "select-box") return;
        const box = normalizedBox(shape.geom);

        ctx.save();
        ctx.setLineDash([8, 6]);
        ctx.lineWidth = 1.5;
        ctx.strokeStyle = "rgba(47, 101, 255, 0.95)";
        ctx.fillStyle = "rgba(47, 101, 255, 0.07)";
        ctx.fillRect(box.x, box.y, box.width, box.height);
        ctx.strokeRect(box.x, box.y, box.width, box.height);
        ctx.restore();
      }

      function applySelectionBox(shape) {
        const box = normalizedBox(shape.geom);
        selectedIds = orderedShapes()
          .filter((item) => boxContainsBox(box, shapeBounds(item)))
          .map((item) => item.id);
      }


      function textLines(shape) {
        return String(shape.geom.text || "").split(/\r?\n/);
      }

      function textFont(shape) {
        const size = shape.geom.fontSize || 28;
        return `${size}px Excalifont, cursive`;
      }

      function textBounds(shape) {
        const size = shape.geom.fontSize || 28;
        const lines = textLines(shape);

        ctx.save();
        ctx.font = textFont(shape);
        const width = Math.max(1, ...lines.map((line) => ctx.measureText(line || " ").width));
        ctx.restore();

        return {
          x: shape.geom.x,
          y: shape.geom.y,
          width,
          height: Math.max(size, lines.length * size * 1.15)
        };
      }

      function seededOffset(seed, index) {
        let value = Math.imul((seed || 1) + index * 374761393, 668265263);
        value = (value ^ (value >>> 13)) >>> 0;
        return ((value % 1000) / 1000 - 0.5) * 0.7;
      }

      function drawTextShape(context, shape) {
        const size = shape.geom.fontSize || 28;
        const lines = textLines(shape);

        context.save();
        context.font = textFont(shape);
        context.textBaseline = "top";
        context.fillStyle = shape.options.stroke || "#222222";
        context.strokeStyle = shape.options.stroke || "#222222";
        context.lineWidth = Math.max(0.35, (shape.options.strokeWidth || 2) * 0.08);

        for (let i = 0; i < lines.length; i++) {
          const y = shape.geom.y + i * size * 1.15;
          const line = lines[i] || " ";

          context.globalAlpha = 0.92;
          context.fillText(line, shape.geom.x, y);

          context.globalAlpha = 0.24;
          context.strokeText(
            line,
            shape.geom.x + seededOffset(shape.options.seed, i * 2),
            y + seededOffset(shape.options.seed, i * 2 + 1)
          );
        }

        context.restore();
      }

      function makeShape(type, start, end, points, options) {
        if (type === "smart") {
          return {
            id: newId(),
            type,
            geom: { points: points.map(roundPoint) },
            options: { ...options },
            drawable: null
          };
        }

        return {
          id: newId(),
          type,
          geom: {
            x1: round1(start.x),
            y1: round1(start.y),
            x2: round1(end.x),
            y2: round1(end.y)
          },
          options: { ...options },
          drawable: null
        };
      }

      function normalizedBox(geom) {
        const x = Math.min(geom.x1, geom.x2);
        const y = Math.min(geom.y1, geom.y2);
        const width = Math.abs(geom.x2 - geom.x1);
        const height = Math.abs(geom.y2 - geom.y1);
        return { x, y, width, height };
      }

      // rough.js curve config for the two freehand shape types. Roughness and bowing
      // are capped so long strokes stay legible; the rest is constant per type.
      const CURVE_RENDER = { maxRoughness: 0.85, maxBowing: 0.7, curveFitting: 0.82, curveTightness: 0.18 };
      const SMART_RENDER = { maxRoughness: 0.9, maxBowing: 0.8, curveFitting: 0.85, curveTightness: 0.15 };

      function curveOpts(opts, cfg) {
        return {
          ...opts,
          fill: undefined,
          fillStyle: undefined,
          roughness: Math.min(opts.roughness, cfg.maxRoughness),
          bowing: Math.min(opts.bowing, cfg.maxBowing),
          curveFitting: cfg.curveFitting,
          curveTightness: cfg.curveTightness
        };

      // Build a rough.js shape with `factory` — the rough generator (canvas) or
      // rough.svg (export); both share the rectangle/ellipse/line/curve API. Text is
      // handled by the callers; every other type routes through here so the canvas
      // and SVG renderers can never drift apart.
      function buildRoughShape(factory, shape) {
        const opts = roughOptions(shape.options, shape.type);

        if (shape.type === "rectangle") {
          const box = normalizedBox(shape.geom);
          return factory.rectangle(box.x, box.y, box.width, box.height, opts);
        }

        if (shape.type === "ellipse") {
          const box = normalizedBox(shape.geom);
          return factory.ellipse(
            box.x + box.width / 2,
            box.y + box.height / 2,
            box.width,
            box.height,
            opts
          );
        }

        if (shape.type === "line") {
          const g = shape.geom;
          return factory.line(g.x1, g.y1, g.x2, g.y2, opts);
        }

        if (shape.type === "curve") {
          const points = curveRenderablePoints(shape.geom.points);
          if (points.length < 2) return null;
          return factory.curve(points, curveOpts(opts, CURVE_RENDER));

        if (shape.type === "smart") {
          const points = freehandRenderablePoints(shape.geom.points);
          if (points.length < 2) return null;
          return factory.curve(points, curveOpts(opts, SMART_RENDER));

        if (shape.type === "path") {
          if (!shape.geom || typeof shape.geom.d !== "string" || !shape.geom.d.trim()) {
            return null;
          }
          return factory.path(shape.geom.d, opts);
        }

        return null;
      }

      function buildDrawable(shape) {
        if (shape.type === "group") {
          return groupChildren(shape)
            .map((child) => buildRoughShape(gen, child))
            .filter(Boolean);
        }
        return shape.type === "text" ? null : buildRoughShape(gen, shape);

      // Imagined drawings are stored as one "group" shape whose geom.children are

      function groupChildren(shape) {

      }

      // A child point p maps to world space as scale*p + (ox, oy).
      function groupScale(geom) {

        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        for (const child of groupChildren(shape)) {
          const b = shapeBaseBounds(child);
          minX = Math.min(minX, b.x);
          minY = Math.min(minY, b.y);
          maxX = Math.max(maxX, b.x + b.width);
          maxY = Math.max(maxY, b.y + b.height);
        }
        const ox = (shape.geom && shape.geom.ox) || 0;
        const oy = (shape.geom && shape.geom.oy) || 0;
        const scale = groupScale(shape.geom);
        if (!Number.isFinite(minX)) return { x: ox, y: oy, width: 0, height: 0 };
        return {
          x: minX * scale + ox,
          y: minY * scale + oy,
          width: (maxX - minX) * scale,
          height: (maxY - minY) * scale
        };
      }

      function isMeaningful(shape) {
        if (!shape) return false;

        if (shape.type === "group") {
          return groupChildren(shape).length > 0;
        }

        if (shape.type === "text") {
          return Boolean(shape.geom && String(shape.geom.text || "").trim());
        }

        if (shape.type === "path") {
          return Boolean(shape.geom && typeof shape.geom.d === "string" && shape.geom.d.trim());
        }

        if (shape.type === "select-box") {
          const g = shape.geom;
          return Math.abs(g.x2 - g.x1) > 4 && Math.abs(g.y2 - g.y1) > 4;
        }

        if (shape.type === "smart" || shape.type === "curve") {
          return shape.geom.points.length > 1 && pathLength(shape.geom.points) > 3;

        const g = shape.geom;
        const dx = g.x2 - g.x1;
        const dy = g.y2 - g.y1;

        if (shape.type === "line") {

        return Math.abs(dx) > 3 && Math.abs(dy) > 3;

      function pathLength(points) {
        let total = 0;
        for (let i = 1; i < points.length; i++) {
          total += Math.hypot(points[i][0] - points[i - 1][0], points[i][1] - points[i - 1][1]);
        }
        return total;
      }

      function simplifyPoints(points, minDistance = 2.5) {
        if (!points || points.length <= 2) return points || [];

        const out = [points[0]];

        for (let i = 1; i < points.length - 1; i++) {
          const prev = out[out.length - 1];
          const curr = points[i];

          if (Math.hypot(curr[0] - prev[0], curr[1] - prev[1]) >= minDistance) {
            out.push(curr);
          }
        }

        out.push(points[points.length - 1]);
        return out;
      }

      function smoothPoints(points, strength = 0.45) {
        if (!points || points.length <= 2) return points || [];

        const out = [points[0]];

        for (let i = 1; i < points.length - 1; i++) {
          const prev = points[i - 1];
          const curr = points[i];
          const next = points[i + 1];

          out.push([
            curr[0] * (1 - strength) + ((prev[0] + next[0]) / 2) * strength,
            curr[1] * (1 - strength) + ((prev[1] + next[1]) / 2) * strength
          ]);
        }

        out.push(points[points.length - 1]);
        return out;
      }

      function freehandRenderablePoints(points) {
        return smoothPoints(simplifyPoints(points, 2.5), 0.45);
      }

      function distancePointToLine(point, start, end) {
        const px = point[0];
        const py = point[1];
        const x1 = start[0];
        const y1 = start[1];
        const x2 = end[0];
        const y2 = end[1];
        const dx = x2 - x1;
        const dy = y2 - y1;
        const lengthSquared = dx * dx + dy * dy;

        if (!lengthSquared) return Math.hypot(px - x1, py - y1);

        return Math.abs(dy * px - dx * py + x2 * y1 - y2 * x1) / Math.sqrt(lengthSquared);
      }

      function douglasPeucker(points, epsilon = 6) {
        if (!points || points.length <= 2) return points || [];

        let maxDistance = 0;
        let index = 0;
        const first = points[0];
        const last = points[points.length - 1];

        for (let i = 1; i < points.length - 1; i++) {
          const distance = distancePointToLine(points[i], first, last);
          if (distance > maxDistance) {
            index = i;
            maxDistance = distance;
          }
        }

        if (maxDistance > epsilon) {
          const left = douglasPeucker(points.slice(0, index + 1), epsilon);
          const right = douglasPeucker(points.slice(index), epsilon);
          return left.slice(0, -1).concat(right);
        }

        return [first, last];
      }

      function resamplePoints(points, targetCount = 34) {
        if (!points || points.length <= 2) return points || [];

        const total = pathLength(points);
        if (total <= 0) return points;

        const count = Math.max(2, Math.min(targetCount, Math.ceil(total / 9)));
        const spacing = total / (count - 1);
        const out = [points[0]];

        let accumulated = 0;
        let nextDistance = spacing;

        for (let i = 1; i < points.length; i++) {
          const prev = points[i - 1];
          const curr = points[i];

        const strokeLength = pathLength(points);
        const strokeDiag = Math.hypot(strokeBounds.width, strokeBounds.height);
        const targetDiag = Math.hypot(targetBounds.width, targetBounds.height) || 1;
        const widthRatio = strokeBounds.width / Math.max(1, targetBounds.width);
        const heightRatio = strokeBounds.height / Math.max(1, targetBounds.height);
        const density = strokeLength / Math.max(1, strokeDiag);
        const features = fillStrokeFeatures(points);

        if (strokeLength < Math.max(52, targetDiag * 0.55)) return false;
        if (strokeDiag < Math.max(20, targetDiag * 0.22)) return false;
        if (strokeDiag > targetDiag * 1.03) return false;

        if (widthRatio < 0.28 && heightRatio < 0.28) return false;
        if (widthRatio < 0.16 || heightRatio < 0.16) return false;

        if (density < 1.95) return false;
        if (features.segmentCount < 8) return false;
        if (features.turnCount < 4) return false;

        const isZigzagLike =
          features.sharpTurns >= 3 &&
          features.alternations >= 2;

        const isHachureLike =
          features.turnCount >= 6 &&
          density >= 2.25 &&
          (widthRatio >= 0.34 || heightRatio >= 0.34);

        return isZigzagLike || isHachureLike;
      }

      function findFillTargetForStroke(points) {
        let bestShape = null;
        let bestScore = 0;

        for (let i = shapes.length - 1; i >= 0; i--) {
          const shape = shapes[i];
          if (shape.type !== "rectangle" && shape.type !== "ellipse") continue;

          let inside = 0;
          for (const point of points) {
            if (shapeContainsPoint(shape, point, 10)) {
              inside++;
            }
          }

          const ratio = inside / points.length;
          if (ratio > 0.92 && ratio > bestScore) {
            bestScore = ratio;
            bestShape = shape;
          }
        }

        return bestShape;
      }

      function tryApplySmartFill(strokeShape) {
        const points = simplifyPoints(strokeShape.geom.points, 3.5);
        if (!points || points.length < 10) return false;

        const target = findFillTargetForStroke(points);
        if (!target) return false;

        if (!fillStrokeLooksIntentional(points, target)) return false;

        const fillStyle = chooseSmartFillStyle(target, points);
        if (!fillStyle) return false;

        recordHistory();
        target.options.fill = smartFillColor();
        target.options.fillStyle = fillStyle;
        target.drawable = buildDrawable(target);
        save();
        net.send({ type: "update", shape: serializeShape(target) });
        redraw();
        return true;
      }

      function drawBackground() {
        ctx.save();
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const w = viewWidth;
        const h = viewHeight;
        const spacing = 28;
        const crossHalf = 3.2;
        const camera = cameraOffset();

        // Anchor the grid to world space so the paper scrolls with the camera.
        const startX = ((-camera.x % spacing) + spacing) % spacing;
        const startY = ((-camera.y % spacing) + spacing) % spacing;

        ctx.fillStyle = "#fbfdff";
        ctx.fillRect(0, 0, w, h);

        ctx.strokeStyle = "rgba(95, 145, 210, 0.10)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let y = startY; y < h + spacing; y += spacing) {
          ctx.moveTo(0, y + 0.5);
          ctx.lineTo(w, y + 0.5);
        }
        ctx.stroke();

        ctx.strokeStyle = "rgba(95, 145, 210, 0.095)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let y = startY; y < h + spacing; y += spacing) {
          for (let x = startX; x < w + spacing; x += spacing) {
            ctx.moveTo(x - crossHalf, y + 0.5);
            ctx.lineTo(x + crossHalf, y + 0.5);
            ctx.moveTo(x + 0.5, y - crossHalf);
            ctx.lineTo(x + 0.5, y + crossHalf);
          }
        }
        ctx.stroke();

        // Margin line anchored to world x=44 so it scrolls horizontally.
        const marginScreenX = 44 - camera.x;
        if (marginScreenX >= 0 && marginScreenX <= w) {
          ctx.strokeStyle = "rgba(120, 155, 205, 0.08)";
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(marginScreenX + 0.5, 0);
          ctx.lineTo(marginScreenX + 0.5, h);
          ctx.stroke();
        }

        ctx.globalAlpha = 0.032;
        ctx.fillStyle = "#4b5b6d";
        const count = Math.floor((w * h) / 6500);
        let seed = 2166136261;

        for (let i = 0; i < count; i++) {
          seed ^= i + w;
          seed = Math.imul(seed, 16777619);
          const x = Math.abs(seed % Math.max(1, Math.floor(w)));

          seed ^= i + h;
          seed = Math.imul(seed, 16777619);
          const y = Math.abs(seed % Math.max(1, Math.floor(h)));

          const size = (seed & 3) === 0 ? 1.2 : 0.8;
          ctx.fillRect(x, y, size, size);
        }

        ctx.restore();
      }

      function isOverBounds(point, bounds) {
        return (
          point.x >= bounds.x &&
          point.x <= bounds.x + bounds.width &&
          point.y >= bounds.y &&
          point.y <= bounds.y + bounds.height
        );
      }

      function drawTrashCan(context, rcInst, x, y, w, h, isHover) {
        const stroke = isHover ? "#c0392b" : "rgba(55, 45, 38, 0.68)";
        const fill = isHover ? "rgba(192, 57, 43, 0.14)" : "rgba(55, 45, 38, 0.05)";
        const sw = Math.max(1.5, w * 0.026);
        const opts = { roughness: 1.7, bowing: 0.9, stroke, strokeWidth: sw, seed: 77 };
        const fillOpts = { ...opts, fill, fillStyle: "solid" };
        const lineOpts = { roughness: 1.3, stroke, strokeWidth: sw * 0.72, seed: 78 };

        context.save();
        context.globalAlpha = isHover ? 0.2 : 0.07;
        context.fillStyle = isHover ? "#c0392b" : "#3d3328";
        context.beginPath();
        context.arc(x + w / 2, y + h / 2 + h * 0.05, Math.max(w, h) * 0.76, 0, Math.PI * 2);
        context.fill();
        context.restore();

        // Handle arch (two angled lines)
        rcInst.line(x + w * 0.33, y + h * 0.14, x + w * 0.46, y + h * 0.02, opts);
        rcInst.line(x + w * 0.54, y + h * 0.02, x + w * 0.67, y + h * 0.14, opts);

        // Lid
        rcInst.rectangle(x - w * 0.06, y + h * 0.12, w * 1.12, h * 0.11, fillOpts);

        // Body
        rcInst.rectangle(x + w * 0.03, y + h * 0.23, w * 0.94, h * 0.77, fillOpts);

        // Vertical lines inside body
        rcInst.line(x + w * 0.28, y + h * 0.34, x + w * 0.27, y + h * 0.93, lineOpts);
        rcInst.line(x + w * 0.50, y + h * 0.34, x + w * 0.50, y + h * 0.93, lineOpts);
        rcInst.line(x + w * 0.72, y + h * 0.34, x + w * 0.73, y + h * 0.93, lineOpts);
      }

      function redraw(previewShape = null) {
        drawBackground();

        const camera = cameraOffset();
        ctx.save();
        ctx.translate(-camera.x, -camera.y);

        for (const shape of orderedShapes()) {
          drawShapeWithCurrentTransform(shape);
        }

        drawSelectionOverlay();

        if (previewShape) {
          if (previewShape.type === "text") {
            drawTextShape(ctx, previewShape);
          } else if (previewShape.type === "select-box") {
            drawSelectMarquee(previewShape);
          } else {
            const previewDrawable = buildDrawable(previewShape);
            if (previewDrawable) {
              rc.draw(previewDrawable);
            }
          }
        }

        if (pendingImagines.length) {
          drawImagineSpinners(performance.now());
        }

        ctx.restore();
        drawPlayers();

        if (activeDrag && activeDrag.tool === "hand") {
          const tw = 68, th = 78;
          const tx = 24;
          const ty = viewHeight - th - 88;
          const screenCurrent = worldToScreen(activeDrag.current);
          const isHover = isOverBounds(screenCurrent, { x: tx, y: ty, width: tw, height: th });
          drawTrashCan(ctx, rc, tx, ty, tw, th, isHover);
        }
      }

      // Strip the cached `drawable` (and any transient fields) before sending
      // a shape over the wire or to localStorage.
      function serializeShape(shape) {
        return {
          id: shape.id,
          type: shape.type,
          geom: shape.geom,
          options: shape.options
        };
      }

      function save() {
        try {
          const serializable = shapes.map(serializeShape);
          localStorage.setItem(STORAGE_KEY, JSON.stringify(serializable));
        } catch {
          // Drawing still works without persistence.
        }
      }

      // Deep clone plain shape data (geom/options are JSON-safe).
      function clone(value) {
        return typeof structuredClone === "function"
          ? structuredClone(value)
          : JSON.parse(JSON.stringify(value));
      }

      function cloneShapeData(shape) {
        return clone(serializeShape(shape));
      }

      function snapshotShapes() {
        return shapes.map(cloneShapeData);
      }

      function hydrateShape(shapeData) {
        const shape = {
          id: typeof shapeData.id === "string" && shapeData.id ? shapeData.id : newId(),
          type: shapeData.type,
          geom: shapeData.geom,
          options: shapeData.options || currentOptions(newSeed()),
          drawable: null
        };

        shape.drawable = buildDrawable(shape);
        return shape;
      }

      // Turn raw shape data (from storage, the network, or a history snapshot) into
      // hydrated, drawable shapes, dropping anything malformed or insignificant.
      function hydrateShapeList(list) {
        if (!Array.isArray(list)) return [];
        const out = [];
        for (const item of list) {
          if (!item || !item.type || !item.geom || !item.options) continue;
          const shape = hydrateShape(item);
          if (isMeaningful(shape)) out.push(shape);
        }
        return out;
      }

      function hydrateAvatarShapeList(list) {
        const source = Array.isArray(list) && list.length ? list : defaultAvatarData();
        return hydrateShapeList(source).slice(0, 250);
      }

      function avatarSnapshot(shapesToSnapshot = localPlayer.avatar) {
        return shapesToSnapshot.map(cloneShapeData);
      }

      function playerPayload(includeAvatar = true) {
        const payload = {
          id: localPlayer.id,
          x: round1(localPlayer.x),
          y: round1(localPlayer.y),
          moving: localPlayer.moving,
          facing: localPlayer.facing
        };

        if (includeAvatar) {
          payload.avatar = localPlayer.avatar.map(serializeShape);
        }

        return payload;
      }

      function persistPlayerState() {
        storeJson(PLAYER_STATE_KEY, {
          x: round1(localPlayer.x),
          y: round1(localPlayer.y)
        });
      }

      function loadPlayerState() {
        const storedPlayer = storedJson(PLAYER_STATE_KEY);
        if (storedPlayer && Number.isFinite(storedPlayer.x) && Number.isFinite(storedPlayer.y)) {
          localPlayer.x = storedPlayer.x;
          localPlayer.y = storedPlayer.y;
          playerInitialized = true;
        }

        localPlayer.avatar = hydrateAvatarShapeList(storedJson(AVATAR_STORAGE_KEY));
        storeJson(AVATAR_STORAGE_KEY, localPlayer.avatar.map(serializeShape));
      }

      function initializePlayerPosition() {
        if (playerInitialized || !viewWidth || !viewHeight) return;
        localPlayer.x = viewWidth / 2;
        localPlayer.y = viewHeight / 2;
        playerInitialized = true;
        persistPlayerState();
      }

      function applyRemotePlayerSet(playerData) {
        if (!playerData || typeof playerData.id !== "string" || playerData.id === PLAYER_ID) return;
        const avatar = hydrateAvatarShapeList(playerData.avatar);
        remotePlayers.set(playerData.id, {
          id: playerData.id,
          x: clampNumber(playerData.x, viewWidth / 2),
          y: clampNumber(playerData.y, viewHeight / 2),
          moving: Boolean(playerData.moving),
          facing: playerData.facing === -1 ? -1 : 1,
          avatar
        });
        redraw();
      }

      function applyRemotePlayerMove(move) {
        if (!move || typeof move.id !== "string" || move.id === PLAYER_ID) return;
        const existing = remotePlayers.get(move.id);
        if (!existing) return;
        existing.x = clampNumber(move.x, existing.x);
        existing.y = clampNumber(move.y, existing.y);
        existing.moving = Boolean(move.moving);
        if (move.facing === -1 || move.facing === 1) {
          existing.facing = move.facing;
        }
        redraw();
      }

      function applyRemotePlayers(players) {
        remotePlayers.clear();
        if (Array.isArray(players)) {
          for (const player of players) {
            applyRemotePlayerSet(player);
          }
        }
        redraw();
      }

      function restoreSnapshot(snapshot) {
        shapes.length = 0;
        shapes.push(...hydrateShapeList(snapshot));
        save();
        redraw();
      }

      function recordHistory(clearRedo = true) {
        historyStack.push(snapshotShapes());
        if (historyStack.length > 100) {
          historyStack.shift();
        }
        if (clearRedo) {
          redoStack.length = 0;
        }
        updateHistoryButtons();
      }

      function updateHistoryButtons() {
        controls.undoBtn.disabled = !historyStack.length && !shapes.length;
        controls.redoBtn.disabled = !redoStack.length;
      }

      function load() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return;

          shapes.push(...hydrateShapeList(JSON.parse(raw)));
          historyStack.length = 0;
        } catch {
          // Corrupt saved data should not break the canvas.
        }
      }

      // ===== Multiplayer networking =====
      // Shared state lives in a Cloudflare Durable Object (see src/index.ts).
      // We send granular ops (add/update/remove/replace/clear) and apply remote
      // ops locally without re-broadcasting them.
      const net = (() => {
        const roomName = new URLSearchParams(window.location.search).get("room") || "main";
        let ws = null;
        let connected = false;
        let reconnectTimer = null;

        function setStatus(isConnected) {
          connected = isConnected;
          statusDot.classList.toggle("connected", isConnected);
          if (!isConnected) {
            presenceEl.textContent = "Reconnecting…";
          }
        }

        function setPresence(count) {
          presenceEl.textContent = `${count} ${count === 1 ? "person" : "people"} here`;
        }

        function connect() {
          const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
          const url = `${protocol}//${window.location.host}/ws?room=${encodeURIComponent(roomName)}`;
          ws = new WebSocket(url);

          ws.onopen = () => {
            setStatus(true);
            if (reconnectTimer) {
              clearTimeout(reconnectTimer);
              reconnectTimer = null;
            }
            sendPlayerSet();
          };

          ws.onmessage = (event) => {
            try {
              handle(JSON.parse(event.data));
            } catch {
              // ignore malformed
            }
          };

          ws.onclose = () => {
            setStatus(false);
            reconnectTimer = setTimeout(connect, 1000);
          };

          ws.onerror = () => {
            // onclose handles reconnection
          };
        }

        function handle(msg) {
          switch (msg.type) {
            case "sync":
              applyRemoteReplace(msg.shapes);
              applyRemotePlayers(msg.players);
              setPresence(msg.count);
              break;
            case "count":
              setPresence(msg.count);
              break;
            case "add":
            case "update":
              applyRemoteUpsert(msg.shape);
              break;
            case "remove":
              applyRemoteRemove(msg.id);
              break;
            case "replace":
              applyRemoteReplace(msg.shapes);
              break;
            case "clear":
              applyRemoteClear();
              break;
            case "player-set":
              applyRemotePlayerSet(msg.player);
              break;
            case "player-move":
              applyRemotePlayerMove(msg);
              break;
            case "player-remove":
              if (typeof msg.id === "string") {
                remotePlayers.delete(msg.id);
                redraw();
              }
              break;
          }
        }

        function sendMessage(msg) {
          if (connected && ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify(msg));
            return true;
          }
          return false;
        }

        function sendPlayerSet() {
          sendMessage({ type: "player-set", player: playerPayload(true) });
        }

        return {
          connect,
          sendPlayerSet,
          sendPlayerMove() {
            sendMessage({
              type: "player-move",
              id: localPlayer.id,
              x: round1(localPlayer.x),
              y: round1(localPlayer.y),
              moving: localPlayer.moving,
              facing: localPlayer.facing
            });
          },
          send(msg) {
            sendMessage(msg);
          }
        };
      })();

      function isEditableTarget(target) {
        if (!target || target === document.body) return false;
        const tag = target.tagName ? target.tagName.toLowerCase() : "";
        return tag === "input" || tag === "textarea" || target.isContentEditable;
      }

      function updateMovementHint() {
        const seen = storedJson(MOVE_HINT_KEY, false);
        moveHintEl.classList.toggle("hidden", Boolean(seen));
      }

      function hideMovementHint() {
        if (storedJson(MOVE_HINT_KEY, false)) return;
        storeJson(MOVE_HINT_KEY, true);
        updateMovementHint();
      }

      function movementVector() {
        const left = pressedMovementKeys.has("a");
        const right = pressedMovementKeys.has("d");
        const up = pressedMovementKeys.has("w");
        const down = pressedMovementKeys.has("s");
        let dx = (right ? 1 : 0) - (left ? 1 : 0);
        let dy = (down ? 1 : 0) - (up ? 1 : 0);
        const length = Math.hypot(dx, dy);
        if (length > 0) {
          dx /= length;
          dy /= length;
        }
        return { dx, dy, moving: length > 0 };
      }

      function broadcastPlayerMove(force = false) {
        const now = performance.now();
        if (!force && now - lastPlayerBroadcast < 50 && localPlayer.moving === lastBroadcastMoving) {
          return;
        }
        lastPlayerBroadcast = now;
        lastBroadcastMoving = localPlayer.moving;
        persistPlayerState();
        net.sendPlayerMove();
      }

      function updateMovement(timestamp) {
        movementFrameId = null;
        if (!lastMoveTimestamp) lastMoveTimestamp = timestamp;

        const dt = Math.min(0.05, Math.max(0, (timestamp - lastMoveTimestamp) / 1000));
        lastMoveTimestamp = timestamp;
        const vector = movementVector();
        const wasMoving = localPlayer.moving;
        localPlayer.moving = vector.moving;

        if (vector.moving) {
          if (vector.dx < 0) {
            localPlayer.facing = -1;
          } else if (vector.dx > 0) {
            localPlayer.facing = 1;
          }
          localPlayer.x = round1(localPlayer.x + vector.dx * PLAYER_SPEED * dt);
          localPlayer.y = round1(localPlayer.y + vector.dy * PLAYER_SPEED * dt);
          hideMovementHint();
          broadcastPlayerMove();
          redraw();
          movementFrameId = requestAnimationFrame(updateMovement);
          return;
        }

        lastMoveTimestamp = 0;
        avatarAnimationStart = 0;
        if (wasMoving) {
          broadcastPlayerMove(true);
          redraw();
        }
      }

      function scheduleMovement() {
        if (movementFrameId === null) {
          movementFrameId = requestAnimationFrame(updateMovement);
        }
      }

      function handleMovementKey(event, isDown) {
        if (event.metaKey || event.ctrlKey || event.altKey) return false;
        if (avatarEditor.isOpen()) return false;
        if (isEditableTarget(event.target)) return false;

        const key = event.key.toLowerCase();
        if (!["w", "a", "s", "d"].includes(key)) return false;

        event.preventDefault();
        if (isDown) {
          pressedMovementKeys.add(key);
          scheduleMovement();
        } else {
          pressedMovementKeys.delete(key);
          scheduleMovement();
        }
        return true;
      }

      // Persist locally and repaint after applying a remote op.
      function commitLocal() {
        save();
        redraw();
      }

      // Apply an incoming add/update: replace the shape with this id, or append.
      function applyRemoteUpsert(shapeData) {
        if (!shapeData || typeof shapeData.id !== "string") return;
        const shape = hydrateShape(shapeData);
        if (!isMeaningful(shape)) return;

        const index = shapes.findIndex((s) => s.id === shape.id);
        if (index >= 0) {
          shapes[index] = shape;
        } else {
          shapes.push(shape);
        }
        commitLocal();
      }

      function applyRemoteRemove(id) {
        if (typeof id !== "string") return;
        const index = shapes.findIndex((s) => s.id === id);
        if (index < 0) return;
        shapes.splice(index, 1);
        selectedIds = selectedIds.filter((sid) => sid !== id);
        commitLocal();
      }

      function applyRemoteReplace(list) {
        shapes.length = 0;
        shapes.push(...hydrateShapeList(list));
        clearSelection();
        commitLocal();
      }

      function applyRemoteClear() {
        shapes.length = 0;
        clearSelection();
        commitLocal();
      }

      function resize() {
        dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 4));
        viewWidth = window.innerWidth;
        viewHeight = window.innerHeight;

        canvas.style.width = `${viewWidth}px`;
        canvas.style.height = `${viewHeight}px`;
        canvas.width = Math.round(viewWidth * dpr);
        canvas.height = Math.round(viewHeight * dpr);

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        rc = rough.canvas(canvas);

        initializePlayerPosition();
        redraw();
      }

      function canvasPoint(event) {
        const rect = canvas.getBoundingClientRect();
        return screenToWorld({
          x: event.clientX - rect.left,
          y: event.clientY - rect.top
        });
      }

      function measurePathBounds(d, ox = 0, oy = 0) {
        const ns = "http://www.w3.org/2000/svg";
        const svg = document.createElementNS(ns, "svg");
        svg.setAttribute("width", "0");
        svg.setAttribute("height", "0");
        svg.style.position = "absolute";
        svg.style.visibility = "hidden";
        const path = document.createElementNS(ns, "path");
        path.setAttribute("d", d);
        svg.appendChild(path);
        document.body.appendChild(svg);
        let box = { x: 0, y: 0, width: 0, height: 0 };
        try {
          box = path.getBBox();
        } catch (err) {
          console.warn("Failed to measure path bounds:", err);
        }
        document.body.removeChild(svg);
        return {
          x: round1(box.x + ox),
          y: round1(box.y + oy),
          width: Math.max(0, round1(box.width)),
          height: Math.max(0, round1(box.height))
        };
      }

      function translateGeom(geom, dx, dy) {
        if (Array.isArray(geom.children)) {
          return {
            ...geom,
            ox: round1((geom.ox || 0) + dx),
            oy: round1((geom.oy || 0) + dy)
          };
        }

        if (geom.points) {
          return {
            points: geom.points.map((point) => [
              round1(point[0] + dx),
              round1(point[1] + dy)
            ])
          };
        }

        if (typeof geom.d === "string") {
          return {
            ...geom,
            ox: round1((geom.ox || 0) + dx),
            oy: round1((geom.oy || 0) + dy)
          };
        }

        if (Object.prototype.hasOwnProperty.call(geom, "text")) {
          return {
            ...geom,
            x: round1(geom.x + dx),
            y: round1(geom.y + dy)
          };
        }

        return {
          x1: round1(geom.x1 + dx),
          y1: round1(geom.y1 + dy),
          x2: round1(geom.x2 + dx),
          y2: round1(geom.y2 + dy)
        };
      }

      function scaleGeom(shape, geom, center, factor) {
        // Scale the whole group about the pivot: T'(p) = factor*(T(p) - center) + center,
        // where T(p) = scale*p + (ox, oy). So scale and offset compose cleanly.
        if (Array.isArray(geom.children)) {
          const nextScale = groupScale(geom) * factor;
          return {
            ...geom,
            scale: Math.round(nextScale * 1e4) / 1e4,
            ox: round1((geom.ox || 0) * factor + center.x * (1 - factor)),
            oy: round1((geom.oy || 0) * factor + center.y * (1 - factor))
          };
        }

        if (geom.points) {
          return {
            ...geom,
            points: geom.points.map((point) => {
              const scaled = scalePointObject({ x: point[0], y: point[1] }, center, factor);
              return [round1(scaled.x), round1(scaled.y)];
            })
          };
        }

        if (Object.prototype.hasOwnProperty.call(geom, "text")) {
          const scaledAnchor = scalePointObject({ x: geom.x, y: geom.y }, center, factor);
          return {
            ...geom,
            x: round1(scaledAnchor.x),
            y: round1(scaledAnchor.y),
            fontSize: Math.max(4, round1((geom.fontSize || 28) * factor))
          };
        }

        const p1 = scalePointObject({ x: geom.x1, y: geom.y1 }, center, factor);
        const p2 = scalePointObject({ x: geom.x2, y: geom.y2 }, center, factor);
        return {
          ...geom,
          x1: round1(p1.x),
          y1: round1(p1.y),
          x2: round1(p2.x),
          y2: round1(p2.y)
        };
      }

      function rotateGeom(shape, geom, center, angle) {
        if (geom.points) {
          return {
            ...geom,
            points: geom.points.map((point) => {
              const rotated = rotatePointObject({ x: point[0], y: point[1] }, center, angle);
              return [round1(rotated.x), round1(rotated.y)];
            })
          };
        }

        if (canStoreRotation(shape)) {
          const source = { ...shape, geom };
          const beforeCenter = boxCenter(shapeBaseBounds(source));
          const afterCenter = rotatePointObject(beforeCenter, center, angle);
          return {
            ...translateGeom(geom, afterCenter.x - beforeCenter.x, afterCenter.y - beforeCenter.y),
            rotation: normalizeRotation(shapeRotation(source) + angle)
          };
        }

        const p1 = rotatePointObject({ x: geom.x1, y: geom.y1 }, center, angle);
        const p2 = rotatePointObject({ x: geom.x2, y: geom.y2 }, center, angle);
        return {
          ...geom,
          x1: round1(p1.x),
          y1: round1(p1.y),
          x2: round1(p2.x),
          y2: round1(p2.y)
        };
      }

      function applyTransformFromOriginal(shape, originalGeom, transform) {
        if (transform.type === "scale") {
          shape.geom = scaleGeom(shape, originalGeom, transform.center, transform.factor);
        } else {
          shape.geom = rotateGeom(shape, originalGeom, transform.center, transform.angle);
        }
      }

      function shapeBaseBounds(shape) {
        if (shape.type === "group") {
          return groupBounds(shape);
        }

        if (shape.type === "text") {
          return textBounds(shape);
        }

        if (shape.type === "path" && shape.geom && typeof shape.geom.d === "string") {
          if (!shape._pathBounds || shape._pathBoundsD !== shape.geom.d) {
            shape._pathBounds = measurePathBounds(shape.geom.d, 0, 0);
            shape._pathBoundsD = shape.geom.d;
          }
          return {
            x: round1(shape._pathBounds.x + (shape.geom.ox || 0)),
            y: round1(shape._pathBounds.y + (shape.geom.oy || 0)),
            width: shape._pathBounds.width,
            height: shape._pathBounds.height
          };
        }

        if (shape.geom.points) {
          const bounds = pointBounds(shape.geom.points);
          return {
            x: bounds.minX,
            y: bounds.minY,
            width: bounds.width,
            height: bounds.height
          };
        }

        return normalizedBox(shape.geom);
      }

      function shapeBounds(shape) {
        const box = shapeBaseBounds(shape);
        return canStoreRotation(shape) ? rotatedBoxBounds(box, shapeRotation(shape)) : box;
      }

      function expandedBoxContains(box, point, padding = 8) {
        return (
          point.x >= box.x - padding &&
          point.x <= box.x + box.width + padding &&
          point.y >= box.y - padding &&
          point.y <= box.y + box.height + padding
        );
      }

      function distanceToPolyline(point, points) {
        if (!points || points.length < 2) return Infinity;

        let best = Infinity;

        for (let i = 1; i < points.length; i++) {
          const a = points[i - 1];
          const b = points[i];
          const dx = b[0] - a[0];
          const dy = b[1] - a[1];
          const lengthSquared = dx * dx + dy * dy;

          let t = 0;
          if (lengthSquared > 0) {
            t = ((point.x - a[0]) * dx + (point.y - a[1]) * dy) / lengthSquared;
            t = Math.max(0, Math.min(1, t));
          }

          const x = a[0] + dx * t;
          const y = a[1] + dy * t;
          best = Math.min(best, Math.hypot(point.x - x, point.y - y));
        }

        return best;
      }

      function pointInShapeForDragging(shape, point) {
        const padding = Math.max(8, (shape.options.strokeWidth || 2) * 3);
        const localPoint = pointInShapeLocalSpace(shape, point);

        if (shape.type === "group") {
          return expandedBoxContains(groupBounds(shape), localPoint, padding);
        }

        if (shape.type === "text") {
          return expandedBoxContains(textBounds(shape), localPoint, 6);
        }

        if (shape.type === "rectangle") {
          const box = normalizedBox(shape.geom);
          if (!expandedBoxContains(box, localPoint, padding)) return false;

          if (shape.options.fill) return true;

          const edgeDistance = Math.min(
            Math.abs(localPoint.x - box.x),
            Math.abs(localPoint.x - (box.x + box.width)),
            Math.abs(localPoint.y - box.y),
            Math.abs(localPoint.y - (box.y + box.height))
          );

          return edgeDistance <= padding;
        }

        if (shape.type === "ellipse") {
          const box = normalizedBox(shape.geom);
          const rx = Math.max(1, box.width / 2);
          const ry = Math.max(1, box.height / 2);
          const cx = box.x + rx;
          const cy = box.y + ry;
          const nx = (localPoint.x - cx) / rx;
          const ny = (localPoint.y - cy) / ry;
          const radius = Math.sqrt(nx * nx + ny * ny);

          if (shape.options.fill && radius <= 1.08) return true;

          const tolerance = padding / Math.max(1, Math.min(rx, ry));
          return Math.abs(radius - 1) <= tolerance;
        }

        if (shape.type === "path") {
          return expandedBoxContains(shapeBaseBounds(shape), localPoint, padding);
        }

        if (shape.type === "line") {
          const g = shape.geom;
          return distancePointToLine(
            [point.x, point.y],
            [g.x1, g.y1],
            [g.x2, g.y2]
          ) <= padding;
        }

        if (shape.geom.points) {
          const box = shapeBounds(shape);
          if (!expandedBoxContains(box, point, padding)) return false;
          return distanceToPolyline(point, shape.geom.points) <= padding;
        }

        return false;
      }

      function hitTestShape(point) {
        const entries = orderedShapeEntries();

        for (let i = entries.length - 1; i >= 0; i--) {
          const { shape, index } = entries[i];
          if (pointInShapeForDragging(shape, point)) {
            return { shape, index };
          }
        }

        return null;
      }

      function autosizeTextEditor(editor) {
        editor.style.height = "auto";
        editor.style.width = "auto";
        editor.style.height = Math.max(42, editor.scrollHeight + 2) + "px";
        editor.style.width = Math.max(160, editor.scrollWidth + 18) + "px";
      }

      function openTextEditor(point) {
        const editor = document.createElement("textarea");
        editor.className = "text-editor";
        editor.spellcheck = false;
        editor.placeholder = "Text";
        const screen = worldToScreen(point);
        editor.style.left = `${Math.round(screen.x)}px`;
        editor.style.top = `${Math.round(screen.y)}px`;
        document.body.appendChild(editor);

        const commit = () => {
          if (!editor.parentNode) return;

          const text = editor.value.trimEnd();
          editor.remove();

          if (!text.trim()) {
            redraw();
            return;
          }

          const shape = {
            id: newId(),
            type: "text",
            geom: {
              x: round1(point.x),
              y: round1(point.y),
              text,
              fontSize: 28
            },
            options: currentOptions(newSeed()),
            drawable: null
          };

          recordHistory();
          shapes.push(shape);
          save();
          net.send({ type: "add", shape: serializeShape(shape) });
          redraw();
        };

        const cancel = () => {
          if (!editor.parentNode) return;
          editor.remove();
          redraw();
        };

        editor.addEventListener("input", () => autosizeTextEditor(editor));
        editor.addEventListener("keydown", (event) => {
          event.stopPropagation();

          if (event.key === "Escape") {
            event.preventDefault();
            cancel();
          }

          if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            commit();
          }
        });
        editor.addEventListener("blur", commit);

        requestAnimationFrame(() => {
          editor.focus();
          autosizeTextEditor(editor);
        });
      }

      function pushStrokePoint(point) {
        if (!activeDrag || activeDrag.tool !== "smart") return;

        const last = activeDrag.points[activeDrag.points.length - 1];
        if (!last || Math.hypot(point.x - last[0], point.y - last[1]) >= 3.5) {
          activeDrag.points.push([point.x, point.y]);
        }
      }

      function isTransformTool(tool) {
        return tool === "scale" || tool === "rotate";
      }
